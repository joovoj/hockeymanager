<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hockeymanager – Joukkue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #005f6e; --primary-dark: #004a57; --gold: #a05f29;
      --bg: #f7fafb; --surface: #ffffff; --border: #e2e8f0;
      --text: #181c1d; --muted: #5b666a; --navy: #0d2233; --nav-h: 56px;
    }
    html { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100%; display: flex; flex-direction: column; font-size: 14px; line-height: 1.5; }
    a { text-decoration: none; color: inherit; }

    /* NAV */
    .hm-nav { position: sticky; top: 0; z-index: 999; height: var(--nav-h); background: #fff;
      border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
    .hm-nav__brand { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 17px;
      color: var(--primary); cursor: pointer; flex-shrink: 0; margin-right: 28px;
      letter-spacing: -0.01em; white-space: nowrap; }
    .hm-nav__links { display: flex; align-items: center; height: var(--nav-h); flex-shrink: 0; }
    .hm-nav__links a { font-size: 13.5px; font-weight: 500; color: var(--muted); padding: 0 12px;
      height: var(--nav-h); display: flex; align-items: center; white-space: nowrap;
      border-bottom: 3px solid transparent; border-top: 3px solid transparent; transition: color 0.15s; }
    .hm-nav__links a:hover { color: var(--primary); }
    .hm-nav__links a.active { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }
    .hm-nav__spacer { flex: 1; min-width: 8px; }
    .hm-nav__right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hm-nav__badge { background: var(--gold); color: #fff; font-size: 10px; font-weight: 700;
      padding: 5px 9px; border-radius: 6px; white-space: nowrap; }
    .hm-nav__lang { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
    .hm-nav__lang .active { color: var(--text); font-weight: 700; }
    .hm-nav__lang .sep { color: var(--border); }
    .hm-nav__btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      padding: 6px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; line-height: 1; }
    .hm-nav__btn--login { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
    .hm-nav__btn--login:hover { background: #e6f4f7; }
    .hm-nav__btn--register { background: var(--primary); color: #fff; border: 1.5px solid var(--primary); }
    .hm-nav__btn--register:hover { background: var(--primary-dark); }
    .hm-nav__btn--logout { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .hm-nav__btn--logout:hover { background: var(--bg); }
    .hm-nav__username { font-size: 12px; font-weight: 600; color: var(--primary); white-space: nowrap; }

    /* FOOTER */
    .hm-footer { background: #fff; border-top: 1px solid var(--border); padding: 14px 24px;
      flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap; }
    .hm-footer__brand { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--text); font-size: 14px; }
    .hm-footer__copy { font-size: 12px; color: var(--muted); }

    /* MODAL */
    .hm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 9999; align-items: center; justify-content: center; }
    .hm-overlay.open { display: flex; }
    .hm-modal { background: #fff; border-radius: 14px; padding: 32px 28px; width: 100%;
      max-width: 380px; position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
    .hm-modal__close { position: absolute; top: 14px; right: 18px; font-size: 22px; cursor: pointer;
      color: var(--muted); background: none; border: none; line-height: 1; font-family: inherit; }
    .hm-modal__title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700;
      margin-bottom: 20px; }
    .hm-field { margin-bottom: 14px; }
    .hm-field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .hm-field input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
      color: var(--text); background: #fff; transition: border-color 0.15s; }
    .hm-field input:focus { border-color: var(--primary); }
    .hm-submit { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif; margin-top: 4px; transition: background 0.15s; }
    .hm-submit:hover { background: var(--primary-dark); }
    .hm-form-switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
    .hm-form-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }
    .hm-msg { font-size: 13px; margin-bottom: 10px; display: none; padding: 8px 12px; border-radius: 6px; }
    .hm-msg.show { display: block; }
    .hm-msg--error { background: #fff0f0; color: #ba1a1a; border: 1px solid #ffc0c0; }
    .hm-msg--success { background: #f0fff5; color: #1a7a3c; border: 1px solid #b0e8c8; }
    @media (max-width: 700px) { .hm-nav__links { display: none; } }

    /* PAGE */
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px 40px; flex: 1; width: 100%; }
    .page-title { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .budget-bar { background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 18px; margin-bottom: 16px; display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
    .budget-item { font-size: 14px; color: var(--muted); }
    .budget-item strong { color: var(--text); font-size: 15px; }
    .team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
    .slot-card { background: #fff; border: 2px dashed var(--border); border-radius: 12px;
      padding: 14px; text-align: center; min-height: 92px; display: flex;
      flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .slot-card.filled { border: 1px solid var(--border); border-style: solid; }
    .slot-pos  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .slot-name { font-size: 14px; font-weight: 700; }
    .slot-pts  { font-size: 13px; color: var(--primary); font-weight: 600; }
    .slot-price{ font-size: 12px; color: var(--muted); }
    .remove-btn { margin-top: 4px; font-size: 11px; color: #ba1a1a; font-weight: 600;
      cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; }
    .confirm-btn { width: 100%; padding: 13px; background: var(--primary); color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif; margin-bottom: 16px; transition: background 0.15s; }
    .confirm-btn:hover { background: var(--primary-dark); }
    .login-notice { background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 40px; text-align: center; color: var(--muted); }
    .login-notice p { font-size: 15px; margin-bottom: 16px; color: var(--text); }
    @media (max-width: 700px) { .team-grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>

    <div class="hm-nav__brand" onclick="location.href='etusivu.html'">Hockeymanager</div>
    <nav class="hm-nav__links">
      <a href="etusivu.html"      id="nav-etusivu">Etusivu</a>
      <a href="joukkue.html"      id="nav-joukkue">Joukkue</a>
      <a href="liigat.html"       id="nav-liigat">Liigat</a>
      <a href="pelikalenteri.html" id="nav-pelikalenteri">Pelikalenteri</a>
      <a href="info.html"         id="nav-info">Info</a>

    <div class="hm-nav__spacer"></div>
    <div class="hm-nav__right">
      <div class="hm-nav__badge">
        <span id="tradesBadgeText">VAIHDOT SULKEUTUU</span> <span id="countdown">--:--:--</span>
      </div>
      <div class="hm-nav__lang">

        <span class="hm-lang-btn" data-lang="en" onclick="hmSetLang('en')" style="cursor:pointer;font-weight:600;" title="English">EN</span>

      <div id="navAuthArea" style="display:flex;align-items:center;gap:6px;">
        <button class="hm-nav__btn hm-nav__btn--login"    onclick="hmOpenModal('login')">Kirjaudu</button>
        <button class="hm-nav__btn hm-nav__btn--register" onclick="hmOpenModal('register')">Rekisteröidy</button>

      <div id="navUserArea" style="display:none;align-items:center;gap:6px;">

  <div class="page">
    <div class="page-title">Joukkue</div>
    <div class="page-sub"><span data-i18n="team.sub">Hallitse kokoonpanoasi</span></div>
    <div id="pageContent">
      <div style="text-align:center;padding:60px 20px;color:var(--muted);">
        <div style="font-size:28px;margin-bottom:10px;">⏳</div>
        <div style="font-size:14px;">Ladataan...</div>
      </div>
    </div>
  </div>

  <footer class="hm-footer">
    <div class="hm-footer__brand">Hockeymanager</div>
    <div class="hm-footer__copy">&copy; 2026 Hockeymanager &ndash; Kaikki oikeudet pidätetään.</div>
  </footer>

  <!-- LOGIN MODAL -->
  <div class="hm-overlay" id="loginModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('login')">&times;</button>
      <div class="hm-modal__title">Kirjaudu sisään</div>
      <div class="hm-msg hm-msg--error"   id="loginError"></div>
      <div class="hm-msg hm-msg--success" id="loginSuccess"></div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="loginEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoLogin()">Kirjaudu</button>
      <div class="hm-form-switch">Ei tiliä? <a onclick="hmSwitchModal('login','register')">Rekisteröidy</a></div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="hm-overlay" id="registerModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('register')">&times;</button>
      <div class="hm-modal__title">Rekisteröidy</div>
      <div class="hm-msg hm-msg--error"   id="registerError"></div>
      <div class="hm-msg hm-msg--success" id="registerSuccess"></div>
      <div class="hm-field">
        <label>Käyttäjänimi</label>
        <input type="text" id="registerUsername" placeholder="Managerin nimi" autocomplete="username"/>
      </div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="registerEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoRegister()">Luo tili</button>
      <div class="hm-form-switch">Onko sinulla jo tili? <a onclick="hmSwitchModal('register','login')">Kirjaudu</a></div>
    </div>
  </div>

  // i18n
  // ─────────────────────────────────────────────────────────
  var HM_TRANSLATIONS = {
    fi: {
      "nav.login":"Kirjaudu","nav.register":"Rekisteröidy","nav.logout":"Ulos",
      "nav.etusivu":"Etusivu","nav.liigat":"Liigat","nav.joukkue":"Joukkue",
      "nav.kalenteri":"Pelikalenteri","nav.info":"Info",
      "nav.trades":"VAIHDOT SULKEUTUU","nav.closed":"SULJETTU",
      "footer.rights":"Kaikki oikeudet pidätetään.",

    },

      "nav.login":"Sign In","nav.register":"Register","nav.logout":"Sign Out",

      "nav.kalenteri":"Schedule","nav.info":"Info",
      "nav.trades":"TRADES CLOSE","nav.closed":"CLOSED",
      "footer.rights":"All rights reserved.",
      "team.sub":"Manage your roster",
      "team.login_msg":"Sign in to view your team.",
      "team.login_btn":"Sign In"
    }
  };

  function hmLang() { return localStorage.getItem("hm_lang") || "fi"; }
  function hmT(key) { var l = hmLang(); return (HM_TRANSLATIONS[l] || HM_TRANSLATIONS["fi"])[key] || key; }
  function hmSetLang(lang) { localStorage.setItem("hm_lang", lang); location.reload(); }

  function hmApplyLang() {
    var lang = hmLang();
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      var val = hmT(key);
      if (el.tagName === "INPUT" && el.hasAttribute("placeholder")) el.placeholder = val;
      else el.textContent = val;
    });
    var navMap = {
      "nav-etusivu":"nav.etusivu","nav-liigat":"nav.liigat",
      "nav-joukkue":"nav.joukkue","nav-pelikalenteri":"nav.kalenteri","nav-info":"nav.info"
    };
    Object.keys(navMap).forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = hmT(navMap[id]);
    });
    var loginBtn = document.querySelector(".hm-nav__btn--login");
    var regBtn   = document.querySelector(".hm-nav__btn--register");
    var outBtn   = document.querySelector(".hm-nav__btn--logout");
    if (loginBtn) loginBtn.textContent = hmT("nav.login");
    if (regBtn)   regBtn.textContent   = hmT("nav.register");
    if (outBtn)   outBtn.textContent   = hmT("nav.logout");
    document.querySelectorAll(".hm-lang-btn").forEach(function(el) {
      var isActive = el.getAttribute("data-lang") === lang;
      el.classList.toggle("active", isActive);
      el.style.opacity = isActive ? "1" : "0.5";
    });
    var badge = document.getElementById("tradesBadgeText");
    if (badge) badge.textContent = hmT("nav.trades");
  }

  // ─────────────────────────────────────────────────────────
  // COUNTDOWN
  // ─────────────────────────────────────────────────────────
  function hmPad(n) { return String(n).padStart(2, "0"); }

  function hmUpdateCountdown() {
    var el = document.getElementById("countdown");
    if (!el) return;
    var diff = HM_DEADLINE - new Date();
    if (diff <= 0) { el.textContent = "SULJETTU"; return; }
    var totalSecs = Math.floor(diff / 1000);
    var days      = Math.floor(totalSecs / 86400);
    var hours     = Math.floor((totalSecs % 86400) / 3600);
    var minutes   = Math.floor((totalSecs % 3600) / 60);
    var secs      = totalSecs % 60;
    if (days > 0) {
      el.textContent = days + "pv " + hmPad(hours) + "h " + hmPad(minutes) + "min";
    } else {
      el.textContent = hmPad(hours) + ":" + hmPad(minutes) + ":" + hmPad(secs);
    }
  }

  // ─────────────────────────────────────────────────────────
  // AUTH
  // ─────────────────────────────────────────────────────────
  function hmUpdateNavAuth() {
    var user     = null;
    try { user = JSON.parse(localStorage.getItem("hm_user") || "null"); } catch(e) {}
    var authArea = document.getElementById("navAuthArea");
    var userArea = document.getElementById("navUserArea");
    var nameEl   = document.getElementById("navUsername");
    if (!authArea || !userArea) return;
    if (user && (user.username || user.email)) {
      authArea.style.display = "none";
      userArea.style.display = "flex";
      if (nameEl) nameEl.textContent = "\uD83D\uDC64 " + (user.username || user.email);
    } else {
      authArea.style.display = "flex";
      userArea.style.display = "none";
    }
  }

  function hmOpenModal(type)  { var el = document.getElementById(type + "Modal"); if (el) el.classList.add("open"); }
  function hmCloseModal(type) { var el = document.getElementById(type + "Modal"); if (el) el.classList.remove("open"); }
  function hmSwitchModal(from, to) { hmCloseModal(from); hmOpenModal(to); }

  function hmShowMsg(id, text) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.classList.add("show");
    el.style.display = "block";
  }
  function hmHideMsg(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("show");
    el.style.display = "none";
  }

  async function hmDoLogin() {
    hmHideMsg("loginError"); hmHideMsg("loginSuccess");
    var email = (document.getElementById("loginEmail").value || "").trim();
    var pwd   = document.getElementById("loginPassword").value || "";
    if (!email || !pwd) { hmShowMsg("loginError", "Täytä kaikki kentät"); return; }
    try {
      var res  = await fetch("/api/auth/login", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email: email, password: pwd})
      });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("loginError", data.error || "Kirjautuminen epäonnistui"); return; }
      localStorage.setItem("hm_token", data.access_token);
      localStorage.setItem("hm_user",  JSON.stringify(data.user));
      hmShowMsg("loginSuccess", "Kirjautuminen onnistui!");
      setTimeout(function() {
        hmCloseModal("login");
        hmUpdateNavAuth();
        hmLoadTeam();
      }, 800);
    } catch(e) { hmShowMsg("loginError", "Verkkovirhe \u2013 yritä uudelleen"); }
  }

  async function hmDoRegister() {
    hmHideMsg("registerError"); hmHideMsg("registerSuccess");
    var uname = (document.getElementById("registerUsername").value || "").trim();
    var email = (document.getElementById("registerEmail").value || "").trim();
    var pwd   = document.getElementById("registerPassword").value || "";
    if (!uname || !email || !pwd) { hmShowMsg("registerError", "Täytä kaikki kentät"); return; }
    if (pwd.length < 6) { hmShowMsg("registerError", "Salasana liian lyhyt (min 6 merkkiä)"); return; }
    try {
      var res  = await fetch("/api/auth/register", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username: uname, email: email, password: pwd})
      });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("registerError", data.error || "Rekisteröityminen epäonnistui"); return; }
      hmShowMsg("registerSuccess", "Tili luotu! Voit nyt kirjautua sisään.");
      setTimeout(function() { hmSwitchModal("register", "login"); }, 1500);
    } catch(e) { hmShowMsg("registerError", "Verkkovirhe \u2013 yritä uudelleen"); }
  }

  async function hmLogout() {
    var token = localStorage.getItem("hm_token");
    if (token) {
      try { await fetch("/api/auth/logout", {method:"POST", headers:{"Authorization":"Bearer "+token}}); } catch(e) {}
    }
    localStorage.removeItem("hm_token");
    localStorage.removeItem("hm_user");
    hmUpdateNavAuth();
    hmShowLoginNotice();
  }

  function hmShowLoginNotice() {
    var pc = document.getElementById("pageContent");
    if (!pc) return;
    pc.innerHTML =
      '<div class="login-notice">' +
      '<p>' + hmT("team.login_msg") + '</p>' +
      '<button class="confirm-btn" style="width:auto;padding:10px 28px;margin:0;" ' +
      'onclick="hmOpenModal(\'login\')">' + hmT("team.login_btn") + '</button>' +
      '</div>';
  }

  // ─────────────────────────────────────────────────────────
  // JOUKKUE — lataus
  // ─────────────────────────────────────────────────────────
  async function hmLoadTeam() {
    var token = localStorage.getItem("hm_token");
    var pc    = document.getElementById("pageContent");
    if (!token) {
      hmShowLoginNotice();
      return;
    }
    if (pc) pc.innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:var(--muted);">' +
      '<div style="font-size:28px;margin-bottom:10px;">\u23F3</div>' +
      '<div style="font-size:14px;">Ladataan joukkuetta...</div></div>';
    try {
      var res = await fetch("/api/team", {headers: {"Authorization": "Bearer " + token}});
      if (res.status === 401) {
        // Token vanhentunut — ei logata ulos automaattisesti, näytetään nappi
        if (pc) pc.innerHTML =
          '<div class="login-notice">' +
          '<p>\uD83D\uDD12 Istuntosi on vanhentunut. Kirjaudu uudelleen.</p>' +
          '<button class="confirm-btn" style="width:auto;padding:10px 28px;margin:0;" ' +
          'onclick="hmOpenModal(\'login\')">Kirjaudu sisään</button></div>';
        return;
      }
      if (!res.ok) {
        if (pc) pc.innerHTML =
          '<div class="login-notice"><p>Joukkueen lataus epäonnistui (virhe ' + res.status + ').</p></div>';
        return;
      }
      var data = await res.json();
      hmRenderTeam(data);
    } catch(e) {
      if (pc) pc.innerHTML =
        '<div class="login-notice"><p>Yhteysvirhe \u2013 tarkista verkkoyhteys.</p>' +
        '<button class="confirm-btn" style="width:auto;padding:10px 28px;margin:0;" ' +
        'onclick="hmLoadTeam()">Yritä uudelleen</button></div>';
    }
  }

  // ─────────────────────────────────────────────────────────
  // JOUKKUE — renderöinti
  // ─────────────────────────────────────────────────────────
  function hmRenderTeam(data) {
    var players    = data.players     || [];
    var budgetLeft = data.budget_left !== undefined ? data.budget_left : 1000;
    var totalPts   = data.total_points || 0;
    var teamName   = data.team_name   || "";

    var byPos = {};
    players.forEach(function(p) {
      if (!byPos[p.pos]) byPos[p.pos] = [];
      byPos[p.pos].push(p);
    });

    var hyokkH  = byPos["H"]  || [];
    var puolP   = byPos["P"]  || [];
    var maaliMV = byPos["MV"] || [];

    var slots = [];
    // Hyökkääjät (3 paikkaa)
    hyokkH.forEach(function(p)  { slots.push(Object.assign({}, p, {label:"Hyökkääjä", filled:true})); });
    for (var i = hyokkH.length; i < 3; i++)  slots.push({pos:"H",  label:"Hyökkääjä",  empty:true});
    // Puolustajat (2 paikkaa)
    puolP.forEach(function(p)   { slots.push(Object.assign({}, p, {label:"Puolustaja", filled:true})); });
    for (var i = puolP.length;  i < 2; i++)  slots.push({pos:"P",  label:"Puolustaja", empty:true});
    // Maalivahti (1 paikka)
    maaliMV.forEach(function(p) { slots.push(Object.assign({}, p, {label:"Maalivahti", filled:true})); });
    if (maaliMV.length === 0)   slots.push({pos:"MV", label:"Maalivahti", empty:true});

    var pc = document.getElementById("pageContent");
    if (!pc) return;

    // Joukkueen nimi -rivi
    var nameHTML =
      '<div style="background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;' +
      'box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
      '<span style="font-size:13px;color:#666;font-weight:600;">JOUKKUEEN NIMI:</span>' +
      '<span id="teamNameDisplay" style="font-weight:700;font-size:16px;color:#0a3d4a;">' +
      (teamName ? teamName : '<em style="color:#bbb;font-weight:400;font-size:14px;">Ei nimeä</em>') +
      '</span>' +
      '<button id="editTeamNameBtn" style="margin-left:4px;background:none;border:1px solid #1a7f8e;' +
      'color:#1a7f8e;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;">\u270F\uFE0F Muokkaa</button>' +
      '<div id="teamNameForm" style="display:none;align-items:center;gap:6px;">' +
      '<input id="teamNameInput" type="text" maxlength="40" placeholder="Joukkueen nimi..." value="' +
      teamName.replace(/"/g, "&quot;") + '"' +
      ' style="padding:6px 10px;border:1px solid #cde;border-radius:6px;font-size:13px;width:160px;"/>' +
      '<button id="saveTeamNameBtn" style="padding:6px 12px;background:#1a7f8e;color:#fff;border:none;' +
      'border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">Tallenna</button>' +
      '</div></div>';

    // Budjetti-rivi
    var budgetHTML =
      '<div class="budget-bar">' +
      '<div class="budget-item">Budjetti j\u00e4ljell\u00e4: <strong>' + budgetLeft + '</strong></div>' +
      '<div class="budget-item">K\u00e4ytetty: <strong>' + (1000 - budgetLeft) + '</strong> / 1000</div>' +
      '<div class="budget-item">Pisteet: <strong>' + totalPts + '</strong></div>' +
      '</div>';

    // Slotit
    var slotsHTML = '<div class="team-grid">';
    slots.forEach(function(s) {
      if (s.empty) {
        slotsHTML +=
          '<div class="slot-card">' +
          '<div class="slot-pos">' + s.pos + '</div>' +
          '<div style="color:var(--muted);font-size:13px;margin-top:4px;">' + s.label + ' \u2013 Tyhjä</div>' +
          '<button class="add-player-btn" data-pos="' + s.pos + '"' +
          ' style="margin-top:8px;padding:6px 14px;background:#1a7f8e;color:#fff;border:none;' +
          'border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">+ Lis\u00e4\u00e4 pelaaja</button>' +
          '</div>';
      } else {
        slotsHTML +=
          '<div class="slot-card filled">' +
          '<div class="slot-pos">' + s.pos + '</div>' +
          '<div class="slot-name">' + (s.name || "").trim() + '</div>' +
          '<div class="slot-pts">'  + (s.points || 0) + ' pistettä</div>' +
          '<div class="slot-price">' + (s.price || 0) + ' M\u20AC</div>' +
          '<button class="remove-btn" data-id="' + s.id + '">\u2715 Poista</button>' +
          '</div>';
      }
    });
    slotsHTML += '</div>';

    // Vahvista-nappi (vain kun 6 pelaajaa)
    var confirmHTML = players.length === 6
      ? '<button class="confirm-btn" id="confirmTeamBtn">\u2713 Vahvista joukkue</button>'
      : '';

    pc.innerHTML = nameHTML + budgetHTML + slotsHTML + confirmHTML;

    // Event delegaatio — yksi listener kaikille napin klikkauksille
    pc.onclick = function(e) {
      var t = e.target;
      if (t.classList.contains("add-player-btn")) {
        _ppPos = t.getAttribute("data-pos") || null;
        hmOpenPlayerPanel();
        return;
      }
      if (t.classList.contains("remove-btn")) {
        hmRemovePlayer(parseInt(t.getAttribute("data-id"), 10));
        return;
      }
      if (t.id === "confirmTeamBtn") { hmConfirmTeam(); return; }
      if (t.id === "editTeamNameBtn") {
        var form = document.getElementById("teamNameForm");
        if (!form) return;
        form.style.display = form.style.display === "none" ? "flex" : "none";
        if (form.style.display === "flex") {
          var inp = document.getElementById("teamNameInput");
          if (inp) inp.focus();
        }
        return;
      }
      if (t.id === "saveTeamNameBtn") { hmSaveTeamName(); return; }
    };
  }

  // ─────────────────────────────────────────────────────────
  // PELAAJAPANEELI
  // ─────────────────────────────────────────────────────────
  var _ppPos = null;

  function hmOpenPlayerPanel() {
    document.getElementById("playerPanel").style.display        = "block";
    document.getElementById("playerPanelOverlay").style.display = "block";
    var sel = document.getElementById("ppPos");
    if (sel && _ppPos) sel.value = _ppPos;
    hmLoadPanelPlayers();
  }

  function hmClosePlayerPanel() {
    document.getElementById("playerPanel").style.display        = "none";
    document.getElementById("playerPanelOverlay").style.display = "none";
    _ppPos = null;
  }

  async function hmLoadPanelPlayers() {
    var country = (document.getElementById("ppCountry") || {}).value || "";
    var pos     = (document.getElementById("ppPos")     || {}).value || "";
    var q       = ((document.getElementById("ppSearch") || {}).value || "").trim();
    var list    = document.getElementById("ppList");
    if (!list) return;
    list.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">Ladataan...</p>';
    try {
      var url = "/api/players?sort=price";
      if (country) url += "&country=" + encodeURIComponent(country);
      if (pos)     url += "&pos="     + encodeURIComponent(pos);
      if (q)       url += "&q="       + encodeURIComponent(q);
      var res = await fetch(url);
      if (!res.ok) throw new Error("API " + res.status);
      var data = await res.json();
      if (!Array.isArray(data) || !data.length) {
        list.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">Ei pelaajia</p>';
        return;
      }
      list.innerHTML = data.map(function(p) {
        return '<div class="pp-row" data-id="' + p.id + '"' +
          ' style="display:flex;justify-content:space-between;align-items:center;' +
          'padding:10px 8px;border-bottom:1px solid #f0f4f5;cursor:pointer;border-radius:6px;">' +
          '<div><div style="font-weight:600;font-size:13px;color:#0a3d4a;">' + (p.name||"").trim() + '</div>' +
          '<div style="font-size:11px;color:#888;">' + (p.country||"") + ' \u00B7 ' + (p.pos||"") + '</div></div>' +
          '<div style="font-weight:700;color:#1a7f8e;font-size:13px;">' + (p.price||0) + ' M\u20AC</div>' +
          '</div>';
      }).join("");
      list.onclick = function(e) {
        var row = e.target.closest(".pp-row");
        if (!row) return;
        hmAddPlayerFromPanel(parseInt(row.getAttribute("data-id"), 10));
      };
    } catch(e) {
      list.innerHTML = '<p style="color:#c0392b;padding:12px;font-size:13px;">Virhe: ' + e.message + '</p>';
    }
  }

  async function hmAddPlayerFromPanel(playerId) {
    var token = localStorage.getItem("hm_token");
    if (!token) { hmOpenModal("login"); return; }
    var list = document.getElementById("ppList");
    if (list) list.style.opacity = "0.5";
    try {
      var res  = await fetch("/api/team/add", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({player_id: playerId})
      });
      var data = await res.json();
      if (list) list.style.opacity = "1";
      if (!res.ok) { alert(data.error || "Virhe lisätessä pelaajaa"); return; }
      hmClosePlayerPanel();
      hmLoadTeam();
    } catch(e) {
      if (list) list.style.opacity = "1";
      alert("Verkkovirhe \u2013 yritä uudelleen");
    }
  }

  async function hmRemovePlayer(id) {
    var token = localStorage.getItem("hm_token");
    if (!token) return;
    try {
      await fetch("/api/team/remove", {
        method: "POST",
        headers: {"Content-Type":"application/json", "Authorization":"Bearer "+token},
        body: JSON.stringify({player_id: id})
      });
      hmLoadTeam();
    } catch(e) { alert("Verkkovirhe \u2013 yritä uudelleen"); }
  }

  async function hmConfirmTeam() {
    var token = localStorage.getItem("hm_token");
    if (!token) return;
    try {
      var res  = await fetch("/api/team/confirm", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token}
      });
      var data = await res.json();
      alert(data.message || data.error || "Valmis!");
    } catch(e) { alert("Verkkovirhe"); }
  }

  async function hmSaveTeamName() {
    var token = localStorage.getItem("hm_token");
    if (!token) return;
    var name = (document.getElementById("teamNameInput").value || "").trim();
    if (!name) { alert("Anna joukkueelle nimi"); return; }
    try {
      var res  = await fetch("/api/team/name", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({name: name})
      });
      var data = await res.json();
      if (!res.ok) { alert(data.error || "Virhe"); return; }
      var form = document.getElementById("teamNameForm");
      if (form) form.style.display = "none";
      hmLoadTeam();
    } catch(e) { alert("Verkkovirhe"); }
  }

  // ─────────────────────────────────────────────────────────
  // INIT — kaikki DOMContentLoaded-wrapperin sisällä
  // ─────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function() {
    // Aktiivinen nav-linkki
    var page = (location.pathname.split("/").pop() || "etusivu.html").split("?")[0];
    var navEl = document.getElementById("nav-" + page.replace(".html", ""));
    if (navEl) navEl.classList.add("active");

    // Modaalit sulkeutuvat taustasta
    document.querySelectorAll(".hm-overlay").forEach(function(el) {
      el.addEventListener("click", function(e) {
        if (e.target === el) el.classList.remove("open");
      });
    });

    // Sulje pelaajapaneeli overlaysta
    var overlay = document.getElementById("playerPanelOverlay");
    if (overlay) overlay.addEventListener("click", hmClosePlayerPanel);

    // Sulje pelaajapaneeli X-napista
    var closeBtn = document.getElementById("closePanelBtn");
    if (closeBtn) closeBtn.addEventListener("click", hmClosePlayerPanel);

    // Kieli
    hmApplyLang();

    // Nav-tila
    hmUpdateNavAuth();

    // Countdown heti + päivitys sekunnin välein
    hmUpdateCountdown();
    setInterval(hmUpdateCountdown, 1000);

    // Joukkueen lataus
    if (localStorage.getItem("hm_token")) {
      hmLoadTeam();
    } else {
      hmShowLoginNotice();
    }
  });
  </script>
</body>
</html>
