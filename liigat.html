<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hockeymanager – Liigat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #005f6e;
      --primary-dark: #004a57;
      --gold: #a05f29;
      --bg: #f7fafb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #181c1d;
      --muted: #5b666a;
      --navy: #0d2233;
      --nav-h: 56px;
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    .hm-nav {
      position: sticky;
      top: 0;
      z-index: 999;
      height: var(--nav-h);
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      flex-shrink: 0;
    }
    .hm-nav__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--primary);
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 28px;
      letter-spacing: -0.01em;
    }
    .hm-nav__links {
      display: flex;
      align-items: center;
      height: var(--nav-h);
      flex-shrink: 0;
    }
    .hm-nav__links a {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      padding: 0 12px;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      border-top: 3px solid transparent;
      transition: color 0.15s;
    }
    .hm-nav__links a:hover { color: var(--primary); }
    .hm-nav__links a.active {
      color: var(--primary);
      font-weight: 700;
      border-bottom-color: var(--primary);
    }
    .hm-nav__spacer { flex: 1; min-width: 8px; }
    .hm-nav__right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .hm-nav__badge {
      background: var(--gold);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .hm-nav__lang {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .hm-nav__lang .active { color: var(--text); font-weight: 700; }
    .hm-nav__lang .sep { color: var(--border); }
    .hm-nav__btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .hm-nav__btn--login {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--login:hover { background: #e6f4f7; }
    .hm-nav__btn--register {
      background: var(--primary);
      color: #fff;
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--register:hover { background: var(--primary-dark); }
    .hm-nav__btn--logout {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .hm-nav__btn--logout:hover { background: var(--bg); }
    .hm-nav__username {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    .hm-footer {
      background: #ffffff;
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hm-footer__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }
    .hm-footer__copy {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── MODAL ── */
    .hm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .hm-overlay.open { display: flex; }
    .hm-modal {
      background: #fff;
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .hm-modal__close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      line-height: 1;
      font-family: inherit;
    }
    .hm-modal__title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }
    .hm-field { margin-bottom: 14px; }
    .hm-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .hm-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
    }
    .hm-field input:focus { border-color: var(--primary); }
    .hm-submit {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .hm-submit:hover { background: var(--primary-dark); }
    .hm-form-switch {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .hm-form-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }
    .hm-msg { font-size: 13px; margin-bottom: 10px; display: none; padding: 8px 12px; border-radius: 6px; }
    .hm-msg--error { background: #fff0f0; color: #ba1a1a; border: 1px solid #ffc0c0; }
    .hm-msg--success { background: #f0fff5; color: #1a7a3c; border: 1px solid #b0e8c8; }

    @media (max-width: 700px) {
      .hm-nav__links { display: none; }
    }


    .page { max-width:860px; margin:0 auto; padding:28px 20px 40px; flex:1; width:100%; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .page-title { font-family:'Montserrat',sans-serif; font-size:26px; font-weight:700; }
    .create-btn { background:var(--primary); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:'Inter',sans-serif; transition:background 0.15s; }
    .create-btn:hover { background:var(--primary-dark); }
    .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:160px; padding:9px 13px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none; }
    .search-box:focus { border-color:var(--primary); }
    .filter-btn { padding:8px 13px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:#fff; color:var(--muted); font-family:'Inter',sans-serif; transition:all 0.15s; }
    .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .league-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .league-name { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:700; margin-bottom:4px; }
    .league-meta { font-size:13px; color:var(--muted); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; }
    .badge-public  { background:#e6f4f7; color:var(--primary); }
    .badge-private { background:#fef3e2; color:var(--gold); }
    .join-btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; background:var(--primary); color:#fff; border:none; white-space:nowrap; font-family:'Inter',sans-serif; transition:background 0.15s; }
    .join-btn:hover { background:var(--primary-dark); }
    .join-btn:disabled { background:var(--border); color:var(--muted); cursor:default; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }

  
    /* ── Pelikalenteri päiväkortit ─────────────────────── */
    .day-block {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .day-header {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .today-badge {
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
    }
    .past-day { opacity: 0.45; }
  </style>
</head>
<body>
  <header class="hm-nav">
    <div class="hm-nav__brand" onclick="location.href='etusivu.html'">Hockeymanager</div>
    <nav class="hm-nav__links">
      <a href="etusivu.html"     id="nav-etusivu">Etusivu</a>
      <a href="joukkue.html"     id="nav-joukkue">Joukkue</a>
      <a href="liigat.html"      id="nav-liigat">Liigat</a>
      <a href="pelikalenteri.html" id="nav-pelikalenteri">Pelikalenteri</a>
      <a href="info.html"        id="nav-info">Info</a>
    </nav>
    <div class="hm-nav__spacer"></div>
    <div class="hm-nav__right">
      <div class="hm-nav__badge"><span id="tradesBadgeText">VAIHDOT SULKEUTUU</span> <span id="countdown">--:--:--</span></div>
      <div class="hm-nav__lang">
        <span class="hm-lang-btn" data-lang="fi" onclick="hmSetLang('fi')" style="cursor:pointer;font-weight:600;" title="Suomi">FI</span><span class="sep">|</span><span class="hm-lang-btn" data-lang="en" onclick="hmSetLang('en')" style="cursor:pointer;font-weight:600;" title="English">EN</span>
      </div>
      <div id="navAuthArea" style="display:flex;align-items:center;gap:6px;">
        <button class="hm-nav__btn hm-nav__btn--login"    onclick="hmOpenModal('login')">Kirjaudu</button>
        <button class="hm-nav__btn hm-nav__btn--register" onclick="hmOpenModal('register')">Rekisteröidy</button>
      </div>
      <div id="navUserArea" style="display:none;align-items:center;gap:6px;">
        <span class="hm-nav__username" id="navUsername"></span>
        <button class="hm-nav__btn hm-nav__btn--logout" onclick="hmLogout()">Ulos</button>
      </div>
    </div>
  </header>
  <div class="page">
    <div class="page-header">
      <div class="page-title">Liigat</div>
      <button class="create-btn" onclick="hmShowCreateLeague()"><span data-i18n="leagues.create">+ Luo liiga</span></button>
    </div>
    <div class="filter-bar">
      <input class="search-box" id="leagueSearch" placeholder="Hae liigaa..." oninput="hmRenderLeagues()"/>
      <button class="filter-btn active" id="filter-all"     onclick="hmSetFilter('all')"><span data-i18n="leagues.all">Kaikki</span></button>
      <button class="filter-btn"        id="filter-public"  onclick="hmSetFilter('public')">Julkiset</button>
      <button class="filter-btn"        id="filter-private" onclick="hmSetFilter('private')">Yksityiset</button>
    </div>
    <div id="leagueList"><div class="empty-state">Ladataan liigoja...</div></div>
  </div>
  <footer class="hm-footer">
    <div class="hm-footer__brand">Hockeymanager</div>
    <div class="hm-footer__copy">© 2026 Hockeymanager – Kaikki oikeudet pidätetään.</div>
  </footer>
  <!-- LOGIN MODAL -->
  <div class="hm-overlay" id="loginModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('login')">&times;</button>
      <div class="hm-modal__title">Kirjaudu sisään</div>
      <div class="hm-msg hm-msg--error"   id="loginError"></div>
      <div class="hm-msg hm-msg--success" id="loginSuccess"></div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="loginEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoLogin()">Kirjaudu</button>
      <div class="hm-form-switch">Ei tiliä? <a onclick="hmSwitchModal('login','register')">Rekisteröidy</a></div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="hm-overlay" id="registerModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('register')">&times;</button>
      <div class="hm-modal__title">Rekisteröidy</div>
      <div class="hm-msg hm-msg--error"   id="registerError"></div>
      <div class="hm-msg hm-msg--success" id="registerSuccess"></div>
      <div class="hm-field">
        <label>Käyttäjänimi</label>
        <input type="text" id="registerUsername" placeholder="Managerin nimi" autocomplete="username"/>
      </div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="registerEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoRegister()">Luo tili</button>
      <div class="hm-form-switch">Onko sinulla jo tili? <a onclick="hmSwitchModal('register','login')">Kirjaudu</a></div>
    </div>
  </div>

    function hmLang() {
      return localStorage.getItem("hm_lang") || "fi";
    }
    function hmT(key) {
      const lang = hmLang();
      return (HM_TRANSLATIONS[lang] || HM_TRANSLATIONS["fi"])[key] || key;
    }
    function hmSetLang(lang) {
      localStorage.setItem("hm_lang", lang);
      location.reload();
    }
    function hmApplyLang() {
      try {
        const lang = hmLang();
        // 1. Kaikki data-i18n -attribuutit
        document.querySelectorAll("[data-i18n]").forEach(el => {
          const key = el.getAttribute("data-i18n");
          const val = hmT(key);
          if (el.tagName === "INPUT" && el.hasAttribute("placeholder")) el.placeholder = val;
          else el.textContent = val;
        });
        // 2. data-i18n-placeholder
        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
          el.placeholder = hmT(el.getAttribute("data-i18n-placeholder"));
        });
        // 3. Nav-linkit
        const navMap = {
          "nav-etusivu":       "nav.etusivu",
          "nav-liigat":        "nav.liigat",
          "nav-joukkue":       "nav.joukkue",
          "nav-pelikalenteri": "nav.kalenteri",
          "nav-info":          "nav.info",
        };
        Object.entries(navMap).forEach(([id, key]) => {
          const el = document.getElementById(id);
          if (el) el.textContent = hmT(key);
        });
        // 4. Auth-napit
        const loginBtn = document.querySelector(".hm-nav__btn--login");
        const regBtn   = document.querySelector(".hm-nav__btn--register");
        const outBtn   = document.querySelector(".hm-nav__btn--logout");
        if (loginBtn) loginBtn.textContent = hmT("nav.login");
        if (regBtn)   regBtn.textContent   = hmT("nav.register");
        if (outBtn)   outBtn.textContent   = hmT("nav.logout");
        // 5. Lang-napit active-tila
        document.querySelectorAll(".hm-lang-btn").forEach(el => {
          el.classList.toggle("active", el.getAttribute("data-lang") === lang);
          el.style.opacity = el.getAttribute("data-lang") === lang ? "1" : "0.5";
        });
        // 6. Trades-badge
        const badge = document.getElementById("tradesBadgeText");
        if (badge) badge.textContent = hmT("nav.trades");
        // 7. Footer
        const footerRights = document.getElementById("footerRights");
        if (footerRights) footerRights.textContent = "\u00a9 2026 Hockeymanager \u2014 " + hmT("footer.rights");
      } catch(e) {
        console.warn("hmApplyLang error:", e);
      }
    }

    function hmPad(n){ return String(n).padStart(2,"0"); }

    function hmUpdateCountdown() {
      const el = document.getElementById("countdown");
      if (!el) return;
      const diff = HM_DEADLINE - new Date();
      if (diff <= 0) { el.textContent = "SULJETTU"; return; }
      const totalSecs = Math.floor(diff / 1000);
      const days    = Math.floor(totalSecs / 86400);
      const hours   = Math.floor((totalSecs % 86400) / 3600);
      const minutes = Math.floor((totalSecs % 3600) / 60);
      if (days > 0) {
        el.textContent = days + "pv " + hmPad(hours) + "h " + hmPad(minutes) + "min";
      } else {
        el.textContent = hmPad(hours) + "h " + hmPad(minutes) + "min";
      }
    }

    function hmGetMatchDayKey() {
      const now = new Date();
      const today = now.getFullYear() + "-" + hmPad(now.getMonth()+1) + "-" + hmPad(now.getDate());
      const first = "2026-05-15";
      const key = today < first ? first : today;
      if (HM_SCHEDULE[key]) return key;
      // etsi seuraava pelipäivä
      for (const d of Object.keys(HM_SCHEDULE).sort()) {
        if (d >= today) return d;
      }
      return null;
    }

    function hmDayLabel(isoKey) {
      const d = new Date(isoKey + "T12:00:00");
      const names = ["Su","Ma","Ti","Ke","To","Pe","La"];
      return names[d.getDay()] + " " + hmPad(d.getDate()) + "." + hmPad(d.getMonth()+1) + ".";
    }

    // ── AUTH ──────────────────────────────────────────────────────────────────
    function hmUpdateNavAuth() {
      const user = JSON.parse(localStorage.getItem("hm_user") || "null");
      const authArea = document.getElementById("navAuthArea");
      const userArea = document.getElementById("navUserArea");
      const nameEl   = document.getElementById("navUsername");
      if (!authArea || !userArea) return;
      if (user && (user.username || user.email)) {
        authArea.style.display = "none";
        userArea.style.display = "flex";
        if (nameEl) nameEl.innerHTML = "👤 " + (user.username || user.email);
      } else {
        authArea.style.display = "flex";
        userArea.style.display = "none";
      }
    }

    function hmOpenModal(type) {
      const el = document.getElementById(type + "Modal");
      if (el) el.classList.add("open");
    }
    function hmCloseModal(type) {
      const el = document.getElementById(type + "Modal");
      if (el) el.classList.remove("open");
    }
    function hmSwitchModal(from, to) { hmCloseModal(from); hmOpenModal(to); }

    function hmShowMsg(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.style.display = "block";
    }
    function hmHideMsg(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = "none";
    }

    async function hmDoLogin() {
      hmHideMsg("loginError"); hmHideMsg("loginSuccess");
      const email = document.getElementById("loginEmail").value.trim();
      const pwd   = document.getElementById("loginPassword").value;
      if (!email || !pwd) { hmShowMsg("loginError","Täytä kaikki kentät"); return; }
      try {
        const res  = await fetch("/api/auth/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({email, password: pwd})
        });
        const data = await res.json();
        if (!res.ok) { hmShowMsg("loginError", data.error || "Kirjautuminen epäonnistui"); return; }
        localStorage.setItem("hm_token", data.access_token);
        localStorage.setItem("hm_user",  JSON.stringify(data.user));
        hmShowMsg("loginSuccess", "Kirjautuminen onnistui!");
        setTimeout(() => { hmCloseModal("login"); hmUpdateNavAuth(); if (typeof onLoginSuccess === "function") onLoginSuccess(); }, 800);
      } catch(e) { hmShowMsg("loginError","Verkkovirhe – yritä uudelleen"); }
    }

    async function hmDoRegister() {
      hmHideMsg("registerError"); hmHideMsg("registerSuccess");
      const uname = document.getElementById("registerUsername").value.trim();
      const email = document.getElementById("registerEmail").value.trim();
      const pwd   = document.getElementById("registerPassword").value;
      if (!uname || !email || !pwd) { hmShowMsg("registerError","Täytä kaikki kentät"); return; }
      if (pwd.length < 6) { hmShowMsg("registerError","Salasana liian lyhyt (min 6 merkkiä)"); return; }
      try {
        const res  = await fetch("/api/auth/register", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({username: uname, email, password: pwd})
        });
        const data = await res.json();
        if (!res.ok) { hmShowMsg("registerError", data.error || "Rekisteröityminen epäonnistui"); return; }
        hmShowMsg("registerSuccess", "Tili luotu! Voit nyt kirjautua sisään.");
        setTimeout(() => hmSwitchModal("register","login"), 1500);
      } catch(e) { hmShowMsg("registerError","Verkkovirhe – yritä uudelleen"); }
    }

    async function hmLogout() {
      const token = localStorage.getItem("hm_token");
      if (token) {
        try { await fetch("/api/auth/logout",{method:"POST",headers:{"Authorization":"Bearer "+token}}); } catch(e){}
      }
      localStorage.removeItem("hm_token");
      localStorage.removeItem("hm_user");
      hmUpdateNavAuth();
    }

    // Aseta aktiivinen nav-linkki
    (function() {
      const page = (location.pathname.split("/").pop() || "etusivu.html").split("?")[0];
      const el = document.getElementById("nav-" + page.replace(".html",""));
      if (el) el.classList.add("active");
    })();

    // Sulje modal klikkaamalla taustan ulkopuolelta
    document.querySelectorAll(".hm-overlay").forEach(function(el){
      el.addEventListener("click", function(e){ if (e.target === el) el.classList.remove("open"); });
    });

    hmUpdateCountdown();
    setInterval(hmUpdateCountdown, 1000);
    hmUpdateNavAuth();
    hmApplyLang();


    let _leagues = [];
    let _filter  = "all";

    async function hmLoadLeagues() {
      try {
        const res = await fetch("/api/leagues");
        if (res.ok) _leagues = await res.json();
      } catch(e) { _leagues = []; }
      hmRenderLeagues();
    }

    function hmSetFilter(f) {
      _filter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      const btn = document.getElementById("filter-" + f);
      if (btn) btn.classList.add("active");
      hmRenderLeagues();
    }

    function hmRenderLeagues() {
      const q = (document.getElementById("leagueSearch").value || "").toLowerCase();
      let list = _leagues;
      if (_filter !== "all") list = list.filter(l => l.type === _filter);
      if (q) list = list.filter(l => l.name.toLowerCase().includes(q));
      const el = document.getElementById("leagueList");
      if (!list.length) { el.innerHTML = '<div class="empty-state">Ei liigoja löytynyt</div>'; return; }
      el.innerHTML = list.map(l => {
        const full = l.member_count >= l.max_members;
        const tb   = l.type === "public"
          ? '<span class="badge badge-public">Julkinen</span>'
          : '<span class="badge badge-private">Yksityinen</span>';
        const btn  = full
          ? '<button class="join-btn" disabled>Täynnä</button>'
          : '<button class="join-btn" onclick="hmJoinLeague(\''+l.id+'\','+( l.type==='private' ? 'true' : 'false' )+')">Liity</button>';
        return '<div class="league-card"><div><div class="league-name">'+l.name+'</div>'
             + '<div class="league-meta">'+tb+'<span>&#128101; '+l.member_count+' / '+l.max_members+'</span></div></div>'+btn+'</div>';
      }).join("");
    }

    function hmShowCreateLeague() {
      const token = localStorage.getItem("hm_token");
      if (!token) { hmOpenModal("login"); return; }
      document.getElementById("clName").value = "";
      document.getElementById("clMax").value  = "20";
      document.querySelector('input[name="clType"][value="public"]').checked = true;
      const err = document.getElementById("clError");
      err.style.display = "none"; err.textContent = "";
      const modal = document.getElementById("createLeagueModal");
      modal.style.display = "flex";
      setTimeout(()=>document.getElementById("clName").focus(), 50);
    }

    async function hmSubmitCreateLeague() {
      const token = localStorage.getItem("hm_token");
      if (!token) return;
      const name  = (document.getElementById("clName").value || "").trim();
      const type  = document.querySelector('input[name="clType"]:checked').value;
      const max   = parseInt(document.getElementById("clMax").value) || 20;
      const err   = document.getElementById("clError");
      err.style.display = "none";
      if (!name) { err.textContent = "Anna liigalle nimi"; err.style.display = "block"; return; }
      if (max < 2 || max > 500) { err.textContent = "Maksimijäsenmäärä 2–500"; err.style.display = "block"; return; }
      try {
        const res  = await fetch("/api/leagues", {
          method: "POST",
          headers: {"Content-Type":"application/json","Authorization":"Bearer "+token},
          body: JSON.stringify({name, type, max_members: max})
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || "Virhe luodessa liigaa"; err.style.display = "block"; return; }
        document.getElementById("createLeagueModal").style.display = "none";
        if (data.join_code) {
          alert("Liiga luotu! 🎉\n\nLiittymiskoodi yksityiseen liigaasi:\n\n" + data.join_code + "\n\nJaa tämä koodi kavereillesi.");
        }
        hmLoadLeagues();
      } catch(e) { err.textContent = "Verkkovirhe – yritä uudelleen"; err.style.display = "block"; }
    }

    let _joinPrivateId = null;

    async function hmJoinLeague(id, isPrivate) {
      const token = localStorage.getItem("hm_token");
      if (!token) { hmOpenModal("login"); return; }
      if (isPrivate) {
        _joinPrivateId = id;
        const leagues  = _leagues.find(l => l.id === id);
        const nameEl   = document.getElementById("joinPrivateName");
        if (nameEl) nameEl.textContent = leagues ? '"' + leagues.name + '"' : "";
        document.getElementById("joinCodeInput").value = "";
        const err = document.getElementById("joinPrivateError");
        err.style.display = "none"; err.textContent = "";
        document.getElementById("joinPrivateModal").style.display = "flex";
        setTimeout(()=>document.getElementById("joinCodeInput").focus(), 50);
        return;
      }
      try {
        const res  = await fetch("/api/leagues/"+id+"/join", {
          method: "POST",
          headers: {"Authorization":"Bearer "+token,"Content-Type":"application/json"},
          body: JSON.stringify({})
        });
        const data = await res.json();
        if (!res.ok) { alert(data.error || "Virhe liittymisessä"); return; }
        alert(data.message || "Liittyminen onnistui!");
        hmLoadLeagues();
      } catch(e) { alert("Verkkovirhe"); }
    }

    async function hmSubmitJoinPrivate() {
      const token = localStorage.getItem("hm_token");
      if (!token || !_joinPrivateId) return;
      const code  = (document.getElementById("joinCodeInput").value || "").trim().toUpperCase();
      const err   = document.getElementById("joinPrivateError");
      err.style.display = "none";
      if (!code) { err.textContent = "Syötä liittymiskoodi"; err.style.display = "block"; return; }
      try {
        const res  = await fetch("/api/leagues/"+_joinPrivateId+"/join", {
          method: "POST",
          headers: {"Authorization":"Bearer "+token,"Content-Type":"application/json"},
          body: JSON.stringify({join_code: code})
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || "Virhe liittymisessä"; err.style.display = "block"; return; }
        document.getElementById("joinPrivateModal").style.display = "none";
        alert(data.message || "Liittyminen onnistui!");
        hmLoadLeagues();
      } catch(e) { err.textContent = "Verkkovirhe"; err.style.display = "block"; }
    }
