<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hockeymanager – Liigat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #005f6e;
      --primary-dark: #004a57;
      --gold: #a05f29;
      --bg: #f7fafb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #181c1d;
      --muted: #5b666a;
      --navy: #0d2233;
      --nav-h: 56px;
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    .hm-nav {
      position: sticky;
      top: 0;
      z-index: 999;
      height: var(--nav-h);
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      flex-shrink: 0;
    }
    .hm-nav__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--primary);
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 28px;
      letter-spacing: -0.01em;
    }
    .hm-nav__links {
      display: flex;
      align-items: center;
      height: var(--nav-h);
      flex-shrink: 0;
    }
    .hm-nav__links a {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      padding: 0 12px;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      border-top: 3px solid transparent;
      transition: color 0.15s;
    }
    .hm-nav__links a:hover { color: var(--primary); }
    .hm-nav__links a.active {
      color: var(--primary);
      font-weight: 700;
      border-bottom-color: var(--primary);
    }
    .hm-nav__spacer { flex: 1; min-width: 8px; }
    .hm-nav__right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .hm-nav__badge {
      background: var(--gold);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .hm-nav__lang {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .hm-nav__lang .active { color: var(--text); font-weight: 700; }
    .hm-nav__lang .sep { color: var(--border); }
    .hm-nav__btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .hm-nav__btn--login {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--login:hover { background: #e6f4f7; }
    .hm-nav__btn--register {
      background: var(--primary);
      color: #fff;
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--register:hover { background: var(--primary-dark); }
    .hm-nav__btn--logout {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .hm-nav__btn--logout:hover { background: var(--bg); }
    .hm-nav__username {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    .hm-footer {
      background: #ffffff;
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hm-footer__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }
    .hm-footer__copy {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── MODAL ── */
    .hm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .hm-overlay.open { display: flex; }
    .hm-modal {
      background: #fff;
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .hm-modal__close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      line-height: 1;
      font-family: inherit;
    }
    .hm-modal__title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }
    .hm-field { margin-bottom: 14px; }
    .hm-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .hm-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
    }
    .hm-field input:focus { border-color: var(--primary); }
    .hm-submit {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .hm-submit:hover { background: var(--primary-dark); }
    .hm-form-switch {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .hm-form-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }
    .hm-msg { font-size: 13px; margin-bottom: 10px; display: none; padding: 8px 12px; border-radius: 6px; }
    .hm-msg--error { background: #fff0f0; color: #ba1a1a; border: 1px solid #ffc0c0; }
    .hm-msg--success { background: #f0fff5; color: #1a7a3c; border: 1px solid #b0e8c8; }

    @media (max-width: 700px) {
      .hm-nav__links { display: none; }
    }


    .page { max-width:860px; margin:0 auto; padding:28px 20px 40px; flex:1; width:100%; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .page-title { font-family:'Montserrat',sans-serif; font-size:26px; font-weight:700; }
    .create-btn { background:var(--primary); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:'Inter',sans-serif; transition:background 0.15s; }
    .create-btn:hover { background:var(--primary-dark); }
    .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .search-box { flex:1; min-width:160px; padding:9px 13px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:'Inter',sans-serif; outline:none; }
    .search-box:focus { border-color:var(--primary); }
    .filter-btn { padding:8px 13px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:#fff; color:var(--muted); font-family:'Inter',sans-serif; transition:all 0.15s; }
    .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .league-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .league-name { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:700; margin-bottom:4px; }
    .league-meta { font-size:13px; color:var(--muted); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; }
    .badge-public  { background:#e6f4f7; color:var(--primary); }
    .badge-private { background:#fef3e2; color:var(--gold); }
    .join-btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; background:var(--primary); color:#fff; border:none; white-space:nowrap; font-family:'Inter',sans-serif; transition:background 0.15s; }
    .join-btn:hover { background:var(--primary-dark); }
    .join-btn:disabled { background:var(--border); color:var(--muted); cursor:default; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }

  </style>
</head>

  </footer>
  <!-- LOGIN MODAL -->

    <div class="hm-modal">

  function hmLang() { return localStorage.getItem("hm_lang") || "fi"; }
  function hmT(key) {
    var lang = hmLang();
    return (HM_TRANSLATIONS[lang] || HM_TRANSLATIONS["fi"])[key] || key;
  }
  function hmSetLang(lang) { localStorage.setItem("hm_lang", lang); location.reload(); }
  function hmApplyLang() {
    try {
      document.querySelectorAll("[data-i18n]").forEach(function(el) {
        var val = hmT(el.getAttribute("data-i18n"));
        if (el.tagName === "INPUT") el.placeholder = val; else el.textContent = val;
      });
      document.querySelectorAll(".hm-lang-btn").forEach(function(el) {
        el.classList.toggle("active", el.getAttribute("data-lang") === hmLang());
      });
    } catch(e) { console.warn("hmApplyLang:", e); }
  }

  function hmPad(n) { return String(n).padStart(2, "0"); }
  function hmUpdateCountdown() {
    var el = document.getElementById("countdown");
    if (!el) return;
    var diff = HM_DEADLINE - new Date();
    if (diff <= 0) { el.textContent = "SULJETTU"; return; }
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    el.textContent = d + " PV " + hmPad(h) + " H " + hmPad(m) + " MIN";
  }
  setInterval(hmUpdateCountdown, 1000);

  function hmGetUser()  { try { return JSON.parse(localStorage.getItem("hm_user") || "null"); } catch { return null; } }
  function hmGetToken() { return localStorage.getItem("hm_token") || ""; }

  function hmUpdateNavAuth() {
    var user     = hmGetUser();
    var authArea = document.getElementById("navAuthArea");
    var userArea = document.getElementById("navUserArea");
    var nameEl   = document.getElementById("navUsername");
    if (!authArea || !userArea) return;
    if (user && user.id) {
      authArea.style.display = "none";
      userArea.style.display = "flex";
      if (nameEl) nameEl.textContent = "👤 " + (user.username || user.email || "");
    } else {
      authArea.style.display = "flex";
      userArea.style.display = "none";
    }
  }

  function hmOpenModal(type)  { var el = document.getElementById(type+"Modal"); if (el) el.classList.add("open"); }
  function hmCloseModal(type) { var el = document.getElementById(type+"Modal"); if (el) el.classList.remove("open"); }
  function hmSwitchModal(from, to) { hmCloseModal(from); hmOpenModal(to); }

  function hmShowMsg(id, msg) { var el = document.getElementById(id); if (!el) return; el.textContent = msg; el.classList.add("show"); }
  function hmHideMsg(id) { var el = document.getElementById(id); if (el) el.classList.remove("show"); }

  async function hmDoLogin() {
    hmHideMsg("loginError"); hmHideMsg("loginSuccess");
    var email = (document.getElementById("loginEmail").value || "").trim();
    var pwd   = (document.getElementById("loginPassword").value || "");
    if (!email || !pwd) { hmShowMsg("loginError", "Täytä kaikki kentät"); return; }
    try {
      var res  = await fetch("/api/auth/login", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:email,password:pwd}) });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("loginError", data.error || "Kirjautuminen epäonnistui"); return; }
      localStorage.setItem("hm_token", data.access_token);
      localStorage.setItem("hm_user",  JSON.stringify(data.user));
      hmShowMsg("loginSuccess", "Kirjautuminen onnistui!");
      setTimeout(function() { hmCloseModal("login"); hmUpdateNavAuth(); hmLoadLeagues(); }, 800);
    } catch(e) { hmShowMsg("loginError", "Verkkovirhe — yritä uudelleen"); }
  }

  async function hmDoRegister() {
    hmHideMsg("registerError"); hmHideMsg("registerSuccess");
    var uname = (document.getElementById("registerUsername").value || "").trim();
    var email = (document.getElementById("registerEmail").value || "").trim();
    var pwd   = (document.getElementById("registerPassword").value || "");
    if (!uname || !email || !pwd) { hmShowMsg("registerError", "Täytä kaikki kentät"); return; }
    if (pwd.length < 6) { hmShowMsg("registerError", "Salasana liian lyhyt (min 6 merkkiä)"); return; }
    try {
      var res  = await fetch("/api/auth/register", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username:uname,email:email,password:pwd}) });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("registerError", data.error || "Rekisteröityminen epäonnistui"); return; }
      hmShowMsg("registerSuccess", data.message || "Tili luotu!");
      setTimeout(function() { hmSwitchModal("register","login"); }, 1800);
    } catch(e) { hmShowMsg("registerError", "Verkkovirhe — yritä uudelleen"); }
  }

  async function hmLogout() {
    localStorage.removeItem("hm_token");
    localStorage.removeItem("hm_user");
    hmUpdateNavAuth();
  }

  // ── Liigat ───────────────────────────────────────────────────────────────
  var _leagues = [];
  var _filter  = "all";
  var _joinPrivateId = null;

  async function hmLoadLeagues() {
    var el = document.getElementById("leagueList");
    if (el) el.innerHTML = '<div class="empty-state">Ladataan liigoja...</div>';
    try {
      var res = await fetch("/api/leagues");
      if (res.ok) _leagues = await res.json();
      else _leagues = [];
    } catch(e) { _leagues = []; }
    hmRenderLeagues();
  }

  function hmSetFilter(f) {
    _filter = f;
    document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    var btn = document.getElementById("filter-" + f);
    if (btn) btn.classList.add("active");
    hmRenderLeagues();
  }

  function hmRenderLeagues() {
    var q    = (document.getElementById("leagueSearch").value || "").toLowerCase();
    var list = _leagues.slice();
    if (_filter !== "all") list = list.filter(function(l) { return l.type === _filter; });
    if (q) list = list.filter(function(l) { return l.name.toLowerCase().includes(q); });
    var el = document.getElementById("leagueList");
    if (!el) return;
    if (!list.length) { el.innerHTML = '<div class="empty-state">Ei liigoja löytynyt</div>'; return; }
    var token    = hmGetToken();
    var user     = hmGetUser();
    var myId     = user ? user.id : null;
    el.innerHTML = list.map(function(l) {
      var full      = l.member_count >= l.max_members;
      var isMember  = l.members && myId && l.members.includes(myId);
      var typeBadge = l.type === "public"
        ? '<span style="background:#e8f7f5;color:#1a7f8e;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;">Julkinen</span>'
        : '<span style="background:#fff3e0;color:#e67e22;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;">🔒 Yksityinen</span>';
      var joinBtn = isMember
        ? '<span style="color:#27ae60;font-size:13px;font-weight:700;">✓ Jäsen</span>'
        : full
          ? '<span style="color:var(--muted);font-size:13px;">Täynnä</span>'
          : '<button class="join-btn" data-id="' + l.id + '" data-private="' + (l.type==="private"?"1":"0") + '">Liity</button>';
      return '<div class="league-card">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
          '<div style="font-weight:700;font-size:15px;">' + l.name + '</div>' +
          typeBadge +
        '</div>' +
        '<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">' +
          l.member_count + ' / ' + l.max_members + ' jäsentä' +
        '</div>' +
        '<div style="display:flex;justify-content:flex-end;">' + joinBtn + '</div>' +
        '</div>';
    }).join("");

    // Event delegaatio
    el.onclick = function(e) {
      var btn = e.target.closest(".join-btn");
      if (!btn) return;
      var id        = parseInt(btn.getAttribute("data-id"), 10);
      var isPrivate = btn.getAttribute("data-private") === "1";
      hmJoinLeague(id, isPrivate);
    };
  }

  function hmToggleJoinCode() {
    var isPrivate = document.querySelector('input[name="clType"]:checked') &&
                    document.querySelector('input[name="clType"]:checked').value === "private";
    var joinCodeDiv = document.getElementById("joinCodeRow");
    if (joinCodeDiv) joinCodeDiv.style.display = isPrivate ? "block" : "none";
  }

  function hmShowCreateLeague() {
    var token = hmGetToken();
    if (!token) { hmOpenModal("login"); return; }
    document.getElementById("clName").value = "";
    document.getElementById("clMax").value  = "20";
    var pubRadio = document.querySelector('input[name="clType"][value="public"]');
    if (pubRadio) pubRadio.checked = true;
    var err = document.getElementById("clError");
    if (err) { err.style.display = "none"; err.textContent = ""; }
    var modal = document.getElementById("createLeagueModal");
    if (modal) { modal.style.display = "flex"; setTimeout(function() { document.getElementById("clName").focus(); }, 50); }
  }

  async function hmSubmitCreateLeague() {
    var token = hmGetToken();
    if (!token) return;
    var name  = (document.getElementById("clName").value || "").trim();
    var typeEl = document.querySelector('input[name="clType"]:checked');
    var type  = typeEl ? typeEl.value : "public";
    var max   = parseInt(document.getElementById("clMax").value) || 20;
    var err   = document.getElementById("clError");
    if (err) err.style.display = "none";
    if (!name) { if (err) { err.textContent = "Anna liigalle nimi"; err.style.display = "block"; } return; }
    if (max < 2 || max > 500) { if (err) { err.textContent = "Maksimijäsenmäärä 2–500"; err.style.display = "block"; } return; }
    try {
      var res  = await fetch("/api/leagues", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({name:name, type:type, max_members:max})
      });
      var data = await res.json();
      if (!res.ok) { if (err) { err.textContent = data.error || "Virhe"; err.style.display = "block"; } return; }
      var modal = document.getElementById("createLeagueModal");
      if (modal) modal.style.display = "none";
      hmLoadLeagues();
    } catch(e) {
      if (err) { err.textContent = "Verkkovirhe"; err.style.display = "block"; }
    }
  }

  function hmJoinLeague(id, isPrivate) {
    var token = hmGetToken();
    if (!token) { hmOpenModal("login"); return; }
    if (isPrivate) {
      _joinPrivateId = id;
      var league = _leagues.find(function(l) { return l.id === id; });
      var nameEl = document.getElementById("joinPrivateName");
      if (nameEl) nameEl.textContent = league ? '"'  + league.name + '"' : "";
      var codeInput = document.getElementById("joinCodeInput");
      if (codeInput) codeInput.value = "";
      var jpErr = document.getElementById("joinPrivateError");
      if (jpErr) { jpErr.style.display = "none"; jpErr.textContent = ""; }
      var modal = document.getElementById("joinPrivateModal");
      if (modal) { modal.style.display = "flex"; setTimeout(function() { if (codeInput) codeInput.focus(); }, 50); }
    } else {
      hmJoinPublicLeague(id);
    }
  }

  async function hmJoinPublicLeague(id) {
    var token = hmGetToken();
    try {
      var res  = await fetch("/api/leagues/" + id + "/join", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({})
      });
      var data = await res.json();
      if (!res.ok) { alert(data.error || "Liittyminen epäonnistui"); return; }
      hmLoadLeagues();
    } catch(e) { alert("Verkkovirhe"); }
  }

  async function hmSubmitJoinPrivate() {
    var token = hmGetToken();
    if (!token || !_joinPrivateId) return;
    var code  = (document.getElementById("joinCodeInput").value || "").trim().toUpperCase();
    var err   = document.getElementById("joinPrivateError");
    if (err) err.style.display = "none";
    if (!code) { if (err) { err.textContent = "Syötä liittymiskoodi"; err.style.display = "block"; } return; }
    try {
      var res  = await fetch("/api/leagues/" + _joinPrivateId + "/join", {
        method: "POST",
        headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({join_code: code})
      });
      var data = await res.json();
      if (!res.ok) { if (err) { err.textContent = data.error || "Virhe"; err.style.display = "block"; } return; }
      var modal = document.getElementById("joinPrivateModal");
      if (modal) modal.style.display = "none";
      _joinPrivateId = null;
      hmLoadLeagues();
    } catch(e) {
      if (err) { err.textContent = "Verkkovirhe"; err.style.display = "block"; }
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function() {
    hmApplyLang();
    hmUpdateNavAuth();
    hmUpdateCountdown();
    document.querySelectorAll(".hm-overlay").forEach(function(el) {
      el.addEventListener("click", function(e) { if (e.target === el) el.classList.remove("open"); });
    });
    hmLoadLeagues();
  });
</script>


  <!-- Luo liiga -modal -->
  <div id="createLeagueModal" onclick="if(event.target===this)this.style.display='none'" style="display:none;position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:28px 24px;width:340px;max-width:94vw;
      box-shadow:0 8px 40px rgba(0,0,0,0.18);font-family:'Inter',sans-serif;">
      <h3 style="margin:0 0 18px;font-size:17px;color:#0a3d4a;">Luo uusi liiga</h3>
      <label style="font-size:13px;font-weight:600;color:#2d3a3c;">Liigan nimi</label>
      <input id="clName" type="text" maxlength="50" placeholder="Esim. Kaveriporukka 2026"
        style="width:100%;box-sizing:border-box;margin:4px 0 12px;padding:9px 12px;
        border:1px solid #cde;border-radius:8px;font-size:14px;outline:none;"/>
      <label style="font-size:13px;font-weight:600;color:#2d3a3c;">Tyyppi</label>
      <div style="display:flex;gap:10px;margin:4px 0 12px;">
        <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer;
          padding:8px 12px;border:2px solid #cde;border-radius:8px;font-size:13px;"
          id="clTypePublicLabel">
          <input type="radio" name="clType" value="public" checked onchange="hmToggleJoinCode()"> Julkinen
        </label>
        <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer;
          padding:8px 12px;border:2px solid #cde;border-radius:8px;font-size:13px;"
          id="clTypePrivateLabel">
          <input type="radio" name="clType" value="private" onchange="hmToggleJoinCode()"> Yksityinen 🔒
        </label>
      </div>
      <label style="font-size:13px;font-weight:600;color:#2d3a3c;">Maksimijäsenmäärä</label>
      <input id="clMax" type="number" min="2" max="500" value="20"
        style="width:100%;box-sizing:border-box;margin:4px 0 16px;padding:9px 12px;
        border:1px solid #cde;border-radius:8px;font-size:14px;outline:none;"/>
      <div style="display:flex;gap:10px;">
        <button onclick="document.getElementById('createLeagueModal').style.display='none'"
          style="flex:1;padding:10px;background:#f0f4f5;border:none;border-radius:8px;
          font-size:14px;cursor:pointer;color:#2d3a3c;">Peruuta</button>
        <button onclick="hmSubmitCreateLeague()"
          style="flex:1;padding:10px;background:#1a7f8e;border:none;border-radius:8px;
          font-size:14px;font-weight:700;color:#fff;cursor:pointer;">Luo liiga</button>
      </div>
      <p id="clError" style="color:#c0392b;font-size:13px;margin:10px 0 0;display:none;"></p>
    </div>
  </div>

  <!-- Liity yksityiseen liigaan -modal -->
  <div id="joinPrivateModal" onclick="if(event.target===this)this.style.display='none'" style="display:none;position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:28px 24px;width:320px;max-width:94vw;
      box-shadow:0 8px 40px rgba(0,0,0,0.18);font-family:'Inter',sans-serif;">
      <h3 style="margin:0 0 8px;font-size:17px;color:#0a3d4a;">🔒 Yksityinen liiga</h3>
      <p style="font-size:13px;color:#666;margin:0 0 14px;" id="joinPrivateName"></p>
      <label style="font-size:13px;font-weight:600;color:#2d3a3c;">Liittymiskoodi</label>
      <input id="joinCodeInput" type="text" maxlength="8" placeholder="Esim. A3F2C1B4"
        style="width:100%;box-sizing:border-box;margin:4px 0 16px;padding:9px 12px;
        border:1px solid #cde;border-radius:8px;font-size:14px;text-transform:uppercase;outline:none;"/>
      <div style="display:flex;gap:10px;">
        <button onclick="document.getElementById('joinPrivateModal').style.display='none'"
          style="flex:1;padding:10px;background:#f0f4f5;border:none;border-radius:8px;
          font-size:14px;cursor:pointer;">Peruuta</button>
        <button onclick="hmSubmitJoinPrivate()"
          style="flex:1;padding:10px;background:#1a7f8e;border:none;border-radius:8px;
          font-size:14px;font-weight:700;color:#fff;cursor:pointer;">Liity</button>
      </div>
      <p id="joinPrivateError" style="color:#c0392b;font-size:13px;margin:10px 0 0;display:none;"></p>
    </div>
  </div>

</body>
</html>
