<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hockeymanager – Liigat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #005f6e; --primary-dark: #004a57; --gold: #a05f29;
      --bg: #f7fafb; --surface: #ffffff; --border: #e2e8f0;
      --text: #181c1d; --muted: #5b666a; --navy: #0d2233;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    button { font-family: 'Inter', sans-serif; }

    /* === NAV === */
    .hm-nav {
      position: sticky; top: 0; z-index: 999;
      height: 56px; min-height: 56px; max-height: 56px;
      background: #ffffff; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center;
      padding: 0 20px; gap: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .hm-nav .hm-brand {
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 17px;
      color: #005f6e; cursor: pointer; white-space: nowrap;
      flex-shrink: 0; margin-right: 28px; letter-spacing: -0.01em;
    }
    .hm-nav .hm-links {
      display: flex; align-items: center; gap: 0; flex-shrink: 0;
    }
    .hm-nav .hm-links a {
      font-size: 13.5px; font-weight: 500; color: #5b666a;
      padding: 0 12px; height: 56px; display: flex; align-items: center;
      white-space: nowrap; border-bottom: 3px solid transparent;
      transition: color 0.15s;
    }
    .hm-nav .hm-links a:hover { color: #005f6e; }
    .hm-nav .hm-links a.active { color: #005f6e; font-weight: 700; border-bottom: 3px solid #005f6e; }
    .hm-nav .hm-spacer { flex: 1; }
    .hm-nav .hm-right {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .hm-nav .hm-badge {
      background: #a05f29; color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 5px 9px; border-radius: 6px;
      white-space: nowrap; letter-spacing: 0.01em;
      font-family: 'Inter', sans-serif;
    }
    .hm-nav .hm-lang {
      font-size: 12px; color: #5b666a;
      display: flex; align-items: center; gap: 3px;
    }
    .hm-nav .hm-lang .active { color: #181c1d; font-weight: 700; }
    .hm-nav .hm-btn {
      font-size: 12px; font-weight: 600;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      white-space: nowrap; font-family: 'Inter', sans-serif;
    }
    .hm-nav .hm-btn-login { background: transparent; color: #005f6e; border: 1.5px solid #005f6e; }
    .hm-nav .hm-btn-register { background: #005f6e; color: #fff; border: 1.5px solid #005f6e; }
    .hm-nav .hm-btn-logout { background: transparent; color: #5b666a; border: 1.5px solid #e2e8f0; }
    .hm-nav .hm-username { font-size: 12px; font-weight: 600; color: #005f6e; white-space: nowrap; }

    /* === FOOTER === */
    .hm-footer {
      background: #ffffff; border-top: 1px solid #e2e8f0;
      padding: 14px 24px; flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .hm-footer .hm-footer-brand {
      font-family: 'Montserrat', sans-serif; font-weight: 700;
      color: #181c1d; font-size: 14px;
    }
    .hm-footer .hm-footer-copy { font-size: 12px; color: #5b666a; }

    /* === MODAL === */
    .hm-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9999; align-items: center; justify-content: center; }
    .hm-modal-overlay.open { display: flex; }
    .hm-modal { background: #fff; border-radius: 14px; padding: 32px 28px; width: 100%; max-width: 380px; position: relative; }
    .hm-modal-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .hm-modal-close { position: absolute; top: 14px; right: 18px; font-size: 22px; cursor: pointer; color: #5b666a; background: none; border: none; line-height: 1; }
    .hm-form-group { margin-bottom: 14px; }
    .hm-form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #5b666a; }
    .hm-form-group input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
    .hm-form-group input:focus { border-color: #005f6e; }
    .hm-submit { width: 100%; padding: 12px; background: #005f6e; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 4px; }
    .hm-submit:hover { background: #004a57; }
    .hm-form-switch { text-align: center; margin-top: 14px; font-size: 13px; color: #5b666a; }
    .hm-form-switch a { color: #005f6e; font-weight: 600; cursor: pointer; }
    .hm-form-error { color: #ba1a1a; font-size: 13px; margin-bottom: 10px; display: none; }
    .hm-form-success { color: #1a7a3c; font-size: 13px; margin-bottom: 10px; display: none; }

    @media (max-width: 700px) {
      .hm-nav .hm-links { display: none; }
      .hm-nav .hm-spacer { display: none; }
    }


    .page { max-width: 860px; margin: 0 auto; padding: 32px 20px 40px; flex: 1; width: 100%; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
    .page-title { font-family: 'Montserrat',sans-serif; font-size: 26px; font-weight: 700; }
    .create-btn { background: #005f6e; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; font-family: 'Inter',sans-serif; }
    .create-btn:hover { background: #004a57; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 160px; padding: 9px 13px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: 'Inter',sans-serif; outline: none; }
    .search-box:focus { border-color: #005f6e; }
    .filter-btn { padding: 8px 13px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #5b666a; font-family: 'Inter',sans-serif; }
    .filter-btn.active { background: #005f6e; color: #fff; border-color: #005f6e; }
    .league-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
    .league-name { font-family: 'Montserrat',sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .league-meta { font-size: 13px; color: #5b666a; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .league-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .badge-public { background: #e6f4f7; color: #005f6e; }
    .badge-private { background: #fef3e2; color: #a05f29; }
    .join-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; background: #005f6e; color: #fff; border: none; white-space: nowrap; font-family: 'Inter',sans-serif; }
    .join-btn:hover { background: #004a57; }
    .join-btn:disabled { background: #e2e8f0; color: #5b666a; cursor: default; }
    .empty-state { text-align: center; padding: 44px 20px; color: #5b666a; font-size: 14px; }

  </style>
</head>
<body>
  <header class="hm-nav">
    <div class="hm-brand" onclick="location.href='etusivu.html'">Hockeymanager</div>
    <nav class="hm-links">
      <a href="etusivu.html" id="nav-etusivu">Etusivu</a>
      <a href="joukkue.html" id="nav-joukkue">Joukkue</a>
      <a href="liigat.html" id="nav-liigat">Liigat</a>
      <a href="pelikalenteri.html" id="nav-pelikalenteri">Pelikalenteri</a>
      <a href="info.html" id="nav-info">Info</a>
    </nav>
    <div class="hm-spacer"></div>
    <div class="hm-right">
      <div class="hm-badge">VAIHDOT SULKEUTUU <span id="countdown">--:--:--</span></div>
      <div class="hm-lang"><span class="active">FI</span><span style="color:#e2e8f0">|</span><span>EN</span></div>
      <div id="navAuthButtons" style="display:flex;gap:6px;">
        <button class="hm-btn hm-btn-login" onclick="hmOpenModal('login')">Kirjaudu</button>
        <button class="hm-btn hm-btn-register" onclick="hmOpenModal('register')">Rekisteröidy</button>
      </div>
      <div id="navUserArea" style="display:none;align-items:center;gap:6px;">
        <span class="hm-username" id="navUsername"></span>
        <button class="hm-btn hm-btn-logout" onclick="hmLogout()">Ulos</button>
      </div>
    </div>
  </header>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Liigat</div>
      <button class="create-btn" onclick="showCreateLeague()">+ Luo liiga</button>
    </div>
    <div class="filter-bar">
      <input class="search-box" id="leagueSearch" placeholder="Hae liigaa..." oninput="renderLeagues()"/>
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Kaikki</button>
      <button class="filter-btn" id="filter-public" onclick="setFilter('public')">Julkiset</button>
      <button class="filter-btn" id="filter-private" onclick="setFilter('private')">Yksityiset</button>
    </div>
    <div id="leagueList"><div class="empty-state">Ladataan liigoja...</div></div>
  </div>

  <footer class="hm-footer">
    <div class="hm-footer-brand">Hockeymanager</div>
    <div class="hm-footer-copy">© 2026 Hockeymanager – Kaikki oikeudet pidätetään.</div>
  </footer>
  <div class="hm-modal-overlay" id="loginModal">
    <div class="hm-modal">
      <button class="hm-modal-close" onclick="hmCloseModal('login')">&times;</button>
      <div class="hm-modal-title">Kirjaudu sisään</div>
      <div class="hm-form-error" id="loginError"></div>
      <div class="hm-form-success" id="loginSuccess"></div>
      <div class="hm-form-group"><label>Sähköposti</label><input type="email" id="loginEmail" placeholder="sinä@email.com"/></div>
      <div class="hm-form-group"><label>Salasana</label><input type="password" id="loginPassword" placeholder="••••••••"/></div>
      <button class="hm-submit" onclick="hmDoLogin()">Kirjaudu</button>
      <div class="hm-form-switch">Ei tiliä? <a onclick="hmSwitchModal('login','register')">Rekisteröidy</a></div>
    </div>
  </div>
  <div class="hm-modal-overlay" id="registerModal">
    <div class="hm-modal">
      <button class="hm-modal-close" onclick="hmCloseModal('register')">&times;</button>
      <div class="hm-modal-title">Rekisteröidy</div>
      <div class="hm-form-error" id="registerError"></div>
      <div class="hm-form-success" id="registerSuccess"></div>
      <div class="hm-form-group"><label>Käyttäjänimi</label><input type="text" id="registerUsername" placeholder="Managerin nimi"/></div>
      <div class="hm-form-group"><label>Sähköposti</label><input type="email" id="registerEmail" placeholder="sinä@email.com"/></div>
      <div class="hm-form-group"><label>Salasana</label><input type="password" id="registerPassword" placeholder="••••••••"/></div>
      <button class="hm-submit" onclick="hmDoRegister()">Luo tili</button>
      <div class="hm-form-switch">Onko sinulla jo tili? <a onclick="hmSwitchModal('register','login')">Kirjaudu</a></div>
    </div>
  </div>
  <script>

    const HM_SCHEDULE = {
      "2026-05-15":[{t:"17:20",g:"Suomi – Saksa"},{t:"17:20",g:"Kanada – Ruotsi"},{t:"21:20",g:"USA – Sveitsi"},{t:"21:20",g:"Tsekki – Tanska"}],
      "2026-05-16":[{t:"13:20",g:"Iso-Britannia – Itävalta"},{t:"13:20",g:"Slovakia – Norja"},{t:"17:20",g:"Unkari – Suomi"},{t:"17:20",g:"Italia – Kanada"},{t:"21:20",g:"Sveitsi – Latvia"},{t:"21:20",g:"Slovenia – Tsekki"}],
      "2026-05-17":[{t:"13:20",g:"Iso-Britannia – USA"},{t:"13:20",g:"Italia – Slovakia"},{t:"17:20",g:"Itävalta – Unkari"},{t:"17:20",g:"Tanska – Ruotsi"},{t:"21:20",g:"Saksa – Latvia"},{t:"21:20",g:"Norja – Slovenia"}],
      "2026-05-18":[{t:"17:20",g:"Suomi – USA"},{t:"17:20",g:"Kanada – Tanska"},{t:"21:20",g:"Saksa – Sveitsi"},{t:"21:20",g:"Ruotsi – Tsekki"}],
      "2026-05-19":[{t:"17:20",g:"Latvia – Itävalta"},{t:"17:20",g:"Italia – Norja"},{t:"21:20",g:"Unkari – Iso-Britannia"},{t:"21:20",g:"Slovenia – Slovakia"}],
      "2026-05-20":[{t:"17:20",g:"Itävalta – Sveitsi"},{t:"17:20",g:"Tsekki – Italia"},{t:"21:20",g:"USA – Saksa"},{t:"21:20",g:"Ruotsi – Slovenia"}],
      "2026-05-21":[{t:"17:20",g:"Latvia – Suomi"},{t:"17:20",g:"Kanada – Norja"},{t:"21:20",g:"Sveitsi – Iso-Britannia"},{t:"21:20",g:"Tanska – Slovakia"}],
      "2026-05-22":[{t:"17:20",g:"Saksa – Unkari"},{t:"17:20",g:"Kanada – Slovenia"},{t:"21:20",g:"Suomi – Iso-Britannia"},{t:"21:20",g:"Ruotsi – Italia"}],
      "2026-05-23":[{t:"13:20",g:"Latvia – USA"},{t:"13:20",g:"Tanska – Slovenia"},{t:"17:20",g:"Sveitsi – Unkari"},{t:"17:20",g:"Slovakia – Tsekki"},{t:"21:20",g:"Itävalta – Saksa"},{t:"21:20",g:"Norja – Ruotsi"}],
      "2026-05-24":[{t:"17:20",g:"Iso-Britannia – Latvia"},{t:"17:20",g:"Tanska – Italia"},{t:"21:20",g:"Suomi – Itävalta"},{t:"21:20",g:"Slovakia – Kanada"}],
      "2026-05-25":[{t:"17:20",g:"USA – Unkari"},{t:"17:20",g:"Tsekki – Norja"},{t:"21:20",g:"Saksa – Iso-Britannia"},{t:"21:20",g:"Slovenia – Italia"}],
      "2026-05-26":[{t:"13:20",g:"Unkari – Latvia"},{t:"13:20",g:"Norja – Tanska"},{t:"17:20",g:"USA – Itävalta"},{t:"17:20",g:"Ruotsi – Slovakia"},{t:"21:20",g:"Sveitsi – Suomi"},{t:"21:20",g:"Tsekki – Kanada"}],
      "2026-05-28":[{t:"17:20",g:"TBA – TBA"},{t:"17:20",g:"TBA – TBA"},{t:"21:20",g:"TBA – TBA"},{t:"21:20",g:"TBA – TBA"}],
      "2026-05-30":[{t:"16:20",g:"TBA – TBA"},{t:"21:00",g:"TBA – TBA"}],
      "2026-05-31":[{t:"16:30",g:"TBA – TBA"},{t:"21:20",g:"TBA – TBA"}]
    };

    // Laskuri: laskee 15.05.2026 klo 17:20 asti (ensimmäinen peli)
    const HM_VAIHTO_DEADLINE = new Date("2026-05-15T17:20:00");

    function hmUpdateCountdown() {
      const now = new Date();
      const el = document.getElementById("countdown");
      if (!el) return;
      const diff = HM_VAIHTO_DEADLINE - now;
      if (diff <= 0) { el.textContent = "00:00:00"; return; }
      const totalSec = Math.floor(diff / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      el.textContent = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    }

    function hmGetTodayKey() {
      const now = new Date();
      return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0");
    }

    // Palauttaa sen päivän avain josta näytetään ottelut:
    // ennen 15.05 -> näytä 15.05, muuten tänään
    function hmGetMatchDayKey() {
      const today = hmGetTodayKey();
      const firstDay = "2026-05-15";
      if (today < firstDay) return firstDay;
      if (HM_SCHEDULE[today]) return today;
      // Etsi seuraava pelipäivä jos tänään ei ole pelejä
      const days = Object.keys(HM_SCHEDULE).sort();
      for (const d of days) { if (d >= today) return d; }
      return null;
    }

    function hmUpdateNavAuth() {
      const user = JSON.parse(localStorage.getItem("hm_user") || "null");
      const btnArea = document.getElementById("navAuthButtons");
      const userArea = document.getElementById("navUserArea");
      if (btnArea) btnArea.style.display = user ? "none" : "flex";
      if (userArea) userArea.style.display = user ? "flex" : "none";
      const nameEl = document.getElementById("navUsername");
      if (nameEl && user) nameEl.textContent = "👤 " + user.username;
    }

    function hmOpenModal(t) { const m = document.getElementById(t+"Modal"); if(m) m.classList.add("open"); }
    function hmCloseModal(t) { const m = document.getElementById(t+"Modal"); if(m) m.classList.remove("open"); }
    function hmSwitchModal(f,t) { hmCloseModal(f); hmOpenModal(t); }

    async function hmLogout() {
      const token = localStorage.getItem("hm_token");
      if (token) { try { await fetch("/api/auth/logout",{method:"POST",headers:{"Authorization":"Bearer "+token}}); } catch(e){} }
      localStorage.removeItem("hm_token"); localStorage.removeItem("hm_user");
      hmUpdateNavAuth();
    }

    async function hmDoLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const pwd = document.getElementById("loginPassword").value;
      const err = document.getElementById("loginError");
      const suc = document.getElementById("loginSuccess");
      err.style.display="none"; suc.style.display="none";
      if (!email||!pwd){err.textContent="Täytä kaikki kentät";err.style.display="block";return;}
      try {
        const res = await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pwd})});
        const data = await res.json();
        if (!res.ok){err.textContent=data.error||"Kirjautuminen epäonnistui";err.style.display="block";return;}
        localStorage.setItem("hm_token",data.access_token);
        localStorage.setItem("hm_user",JSON.stringify(data.user));
        suc.textContent="Kirjautuminen onnistui!";suc.style.display="block";
        setTimeout(()=>{hmCloseModal("login");hmUpdateNavAuth();if(typeof onLoginSuccess==="function")onLoginSuccess();},800);
      } catch(e){err.textContent="Verkkovirhe";err.style.display="block";}
    }

    async function hmDoRegister() {
      const uname = document.getElementById("registerUsername").value.trim();
      const email = document.getElementById("registerEmail").value.trim();
      const pwd = document.getElementById("registerPassword").value;
      const err = document.getElementById("registerError");
      const suc = document.getElementById("registerSuccess");
      err.style.display="none"; suc.style.display="none";
      if (!uname||!email||!pwd){err.textContent="Täytä kaikki kentät";err.style.display="block";return;}
      if (pwd.length<6){err.textContent="Salasana liian lyhyt (min 6 merkkiä)";err.style.display="block";return;}
      try {
        const res = await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:uname,email,password:pwd})});
        const data = await res.json();
        if (!res.ok){err.textContent=data.error||"Rekisteröityminen epäonnistui";err.style.display="block";return;}
        suc.textContent="Tili luotu! Voit nyt kirjautua sisään.";suc.style.display="block";
        setTimeout(()=>hmSwitchModal("register","login"),1500);
      } catch(e){err.textContent="Verkkovirhe";err.style.display="block";}
    }

    // Aseta aktiivinen nav-linkki
    (function(){
      const page = location.pathname.split("/").pop() || "etusivu.html";
      const key = page.replace(".html","").replace("oma-","");
      const el = document.getElementById("nav-"+page.replace(".html","")) ||
                 document.getElementById("nav-"+key);
      if (el) el.classList.add("active");
    })();

    document.querySelectorAll(".hm-modal-overlay").forEach(el=>{
      el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open");});
    });

    hmUpdateCountdown();
    setInterval(hmUpdateCountdown, 1000);
    hmUpdateNavAuth();


    let allLeagues = [];
    let currentFilter = "all";

    async function loadLeagues() {
      try {
        const res = await fetch("/api/leagues");
        allLeagues = await res.json();
      } catch(e) { allLeagues = []; }
      renderLeagues();
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
      document.getElementById("filter-"+f).classList.add("active");
      renderLeagues();
    }

    function renderLeagues() {
      const q = document.getElementById("leagueSearch").value.toLowerCase();
      let list = allLeagues;
      if (currentFilter !== "all") list = list.filter(l=>l.type===currentFilter);
      if (q) list = list.filter(l=>l.name.toLowerCase().includes(q));
      const el = document.getElementById("leagueList");
      if (!list.length) { el.innerHTML = '<div class="empty-state">Ei liigoja löytynyt</div>'; return; }
      el.innerHTML = list.map(l=>{
        const full = l.member_count >= l.max_members;
        const tb = l.type==="public"
          ? '<span class="league-badge badge-public">Julkinen</span>'
          : '<span class="league-badge badge-private">Yksityinen</span>';
        const btn = full
          ? '<button class="join-btn" disabled>Täynnä</button>'
          : '<button class="join-btn" onclick="joinLeague(''+l.id+'')">Liity</button>';
        return '<div class="league-card"><div><div class="league-name">'+l.name+'</div><div class="league-meta">'+tb+'<span>👥 '+l.member_count+' / '+l.max_members+'</span></div></div>'+btn+'</div>';
      }).join("");
    }

    async function joinLeague(id) {
      const token = localStorage.getItem("hm_token");
      if (!token) { hmOpenModal("login"); return; }
      try {
        const res = await fetch('/api/leagues/'+id+'/join',{method:"POST",headers:{"Authorization":"Bearer "+token}});
        const data = await res.json();
        alert(data.message||data.error);
        loadLeagues();
      } catch(e) { alert("Verkkovirhe"); }
    }

    function showCreateLeague() {
      const token = localStorage.getItem("hm_token");
      if (!token) { hmOpenModal("login"); return; }
      const name = prompt("Liigan nimi:");
      if (!name) return;
      const type = confirm("Julkinen liiga? (OK = Julkinen, Peruuta = Yksityinen)") ? "public" : "private";
      const max = parseInt(prompt("Maksimijäsenmäärä (2-500):","20")) || 20;
      fetch("/api/leagues",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({name,type,max_members:max})})
        .then(r=>r.json()).then(d=>{alert(d.message||d.error);loadLeagues();});
    }

    loadLeagues();

  </script>
</body>
</html>
