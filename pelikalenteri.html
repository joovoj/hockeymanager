<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hockeymanager – Pelikalenteri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #005f6e;
      --primary-dark: #004a57;
      --gold: #a05f29;
      --bg: #f7fafb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #181c1d;
      --muted: #5b666a;
      --navy: #0d2233;
      --nav-h: 56px;
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    .hm-nav {
      position: sticky;
      top: 0;
      z-index: 999;
      height: var(--nav-h);
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      flex-shrink: 0;
    }
    .hm-nav__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--primary);
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 28px;
      letter-spacing: -0.01em;
    }
    .hm-nav__links {
      display: flex;
      align-items: center;
      height: var(--nav-h);
      flex-shrink: 0;
    }
    .hm-nav__links a {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      padding: 0 12px;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      border-top: 3px solid transparent;
      transition: color 0.15s;
    }
    .hm-nav__links a:hover { color: var(--primary); }
    .hm-nav__links a.active {
      color: var(--primary);
      font-weight: 700;
      border-bottom-color: var(--primary);
    }
    .hm-nav__spacer { flex: 1; min-width: 8px; }
    .hm-nav__right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .hm-nav__badge {
      background: var(--gold);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .hm-nav__lang {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .hm-nav__lang .active { color: var(--text); font-weight: 700; }
    .hm-nav__lang .sep { color: var(--border); }
    .hm-nav__btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .hm-nav__btn--login {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--login:hover { background: #e6f4f7; }
    .hm-nav__btn--register {
      background: var(--primary);
      color: #fff;
      border: 1.5px solid var(--primary);
    }
    .hm-nav__btn--register:hover { background: var(--primary-dark); }
    .hm-nav__btn--logout {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .hm-nav__btn--logout:hover { background: var(--bg); }
    .hm-nav__username {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    .hm-footer {
      background: #ffffff;
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hm-footer__brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }
    .hm-footer__copy {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── MODAL ── */
    .hm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .hm-overlay.open { display: flex; }
    .hm-modal {
      background: #fff;
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .hm-modal__close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      line-height: 1;
      font-family: inherit;
    }
    .hm-modal__title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }
    .hm-field { margin-bottom: 14px; }
    .hm-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .hm-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
    }
    .hm-field input:focus { border-color: var(--primary); }
    .hm-submit {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .hm-submit:hover { background: var(--primary-dark); }
    .hm-form-switch {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .hm-form-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }
    .hm-msg { font-size: 13px; margin-bottom: 10px; display: none; padding: 8px 12px; border-radius: 6px; }
    .hm-msg--error { background: #fff0f0; color: #ba1a1a; border: 1px solid #ffc0c0; }
    .hm-msg--success { background: #f0fff5; color: #1a7a3c; border: 1px solid #b0e8c8; }

    @media (max-width: 700px) {
      .hm-nav__links { display: none; }
    }


    .page { max-width: 860px; margin: 0 auto; padding: 28px 20px 40px; flex: 1; width: 100%; }
    .page-title { font-family: 'Montserrat',sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .day-block { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
    .day-header {
      padding: 12px 18px;
      background: var(--navy);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .day-header .today-badge {
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .match-row {
      display: flex;
      align-items: center;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
    }
    .match-row:last-child { border-bottom: none; }
    .match-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      min-width: 44px;
      flex-shrink: 0;
    }
    .match-teams {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

  </style>

      </div>
      <div id="navAuthArea" style="display:flex;align-items:center;gap:6px;">
        <button class="hm-nav__btn hm-nav__btn--login"    onclick="hmOpenModal('login')">Kirjaudu</button>
        <button class="hm-nav__btn hm-nav__btn--register" onclick="hmOpenModal('register')">Rekisteröidy</button>
      </div>
      <div id="navUserArea" style="display:none;align-items:center;gap:6px;">
        <span class="hm-nav__username" id="navUsername"></span>
        <button class="hm-nav__btn hm-nav__btn--logout" onclick="hmLogout()">Ulos</button>
      </div>
    </div>
  </header>

  <div class="page">
    <div class="page-title">📅 Pelikalenteri</div>
    <div class="page-sub">MM-kisat 2026 – Otteluohjelma</div>
    <div id="calendarContent"></div>
  </div>

  <footer class="hm-footer">
    <div class="hm-footer__brand">Hockeymanager</div>
    <div class="hm-footer__copy">© 2026 Hockeymanager – Kaikki oikeudet pidätetään.</div>
  </footer>
  <!-- LOGIN MODAL -->
  <div class="hm-overlay" id="loginModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('login')">&times;</button>
      <div class="hm-modal__title">Kirjaudu sisään</div>
      <div class="hm-msg hm-msg--error"   id="loginError"></div>
      <div class="hm-msg hm-msg--success" id="loginSuccess"></div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="loginEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoLogin()">Kirjaudu</button>
      <div class="hm-form-switch">Ei tiliä? <a onclick="hmSwitchModal('login','register')">Rekisteröidy</a></div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="hm-overlay" id="registerModal">
    <div class="hm-modal">
      <button class="hm-modal__close" onclick="hmCloseModal('register')">&times;</button>
      <div class="hm-modal__title">Rekisteröidy</div>
      <div class="hm-msg hm-msg--error"   id="registerError"></div>
      <div class="hm-msg hm-msg--success" id="registerSuccess"></div>
      <div class="hm-field">
        <label>Käyttäjänimi</label>
        <input type="text" id="registerUsername" placeholder="Managerin nimi" autocomplete="username"/>
      </div>
      <div class="hm-field">
        <label>Sähköposti</label>
        <input type="email" id="registerEmail" placeholder="sinä@email.com" autocomplete="email"/>
      </div>
      <div class="hm-field">
        <label>Salasana</label>
        <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="hm-submit" onclick="hmDoRegister()">Luo tili</button>
      <div class="hm-form-switch">Onko sinulla jo tili? <a onclick="hmSwitchModal('register','login')">Kirjaudu</a></div>
    </div>
  </div>

  function hmLang() { return localStorage.getItem("hm_lang") || "fi"; }
  function hmT(key) {
    var lang = hmLang();
    return (HM_TRANSLATIONS[lang] || HM_TRANSLATIONS["fi"])[key] || key;
  }
  function hmSetLang(lang) { localStorage.setItem("hm_lang", lang); location.reload(); }
  function hmApplyLang() {
    try {
      var lang = hmLang();
      document.querySelectorAll("[data-i18n]").forEach(function(el) {
        var val = hmT(el.getAttribute("data-i18n"));
        if (el.tagName === "INPUT") el.placeholder = val; else el.textContent = val;
      });
      document.querySelectorAll(".hm-lang-btn").forEach(function(el) {
        el.classList.toggle("active", el.getAttribute("data-lang") === lang);
      });
    } catch(e) { console.warn("hmApplyLang:", e); }
  }

  function hmPad(n) { return String(n).padStart(2, "0"); }

  function hmUpdateCountdown() {
    var el = document.getElementById("countdown");
    if (!el) return;
    var diff = HM_DEADLINE - new Date();
    if (diff <= 0) { el.textContent = "SULJETTU"; return; }
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    el.textContent = d + " PV " + hmPad(h) + " H " + hmPad(m) + " MIN";
  }
  setInterval(hmUpdateCountdown, 1000);

  function hmGetUser()  { try { return JSON.parse(localStorage.getItem("hm_user") || "null"); } catch { return null; } }
  function hmGetToken() { return localStorage.getItem("hm_token") || ""; }

  function hmUpdateNavAuth() {
    var user     = hmGetUser();
    var authArea = document.getElementById("navAuthArea");
    var userArea = document.getElementById("navUserArea");
    var nameEl   = document.getElementById("navUsername");
    if (!authArea || !userArea) return;
    if (user && user.id) {
      authArea.style.display = "none";
      userArea.style.display = "flex";
      if (nameEl) nameEl.textContent = "👤 " + (user.username || user.email || "");
    } else {
      authArea.style.display = "flex";
      userArea.style.display = "none";
    }
  }

  function hmOpenModal(type) { var el = document.getElementById(type + "Modal"); if (el) el.classList.add("open"); }
  function hmCloseModal(type) { var el = document.getElementById(type + "Modal"); if (el) el.classList.remove("open"); }
  function hmSwitchModal(from, to) { hmCloseModal(from); hmOpenModal(to); }

  document.addEventListener("DOMContentLoaded", function() {
    document.querySelectorAll(".hm-overlay").forEach(function(el) {
      el.addEventListener("click", function(e) { if (e.target === el) el.classList.remove("open"); });
    });
  });

  function hmShowMsg(id, msg) { var el = document.getElementById(id); if (!el) return; el.textContent = msg; el.classList.add("show"); }
  function hmHideMsg(id) { var el = document.getElementById(id); if (el) el.classList.remove("show"); }

  async function hmDoLogin() {
    hmHideMsg("loginError"); hmHideMsg("loginSuccess");
    var email = (document.getElementById("loginEmail").value || "").trim();
    var pwd   = (document.getElementById("loginPassword").value || "");
    if (!email || !pwd) { hmShowMsg("loginError", "Täytä kaikki kentät"); return; }
    try {
      var res  = await fetch("/api/auth/login", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:email,password:pwd}) });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("loginError", data.error || "Kirjautuminen epäonnistui"); return; }
      localStorage.setItem("hm_token", data.access_token);
      localStorage.setItem("hm_user", JSON.stringify(data.user));
      hmShowMsg("loginSuccess", "Kirjautuminen onnistui!");
      setTimeout(function() { hmCloseModal("login"); hmUpdateNavAuth(); }, 800);
    } catch(e) { hmShowMsg("loginError", "Verkkovirhe — yritä uudelleen"); }
  }

  async function hmDoRegister() {
    hmHideMsg("registerError"); hmHideMsg("registerSuccess");
    var uname = (document.getElementById("registerUsername").value || "").trim();
    var email = (document.getElementById("registerEmail").value || "").trim();
    var pwd   = (document.getElementById("registerPassword").value || "");
    if (!uname || !email || !pwd) { hmShowMsg("registerError", "Täytä kaikki kentät"); return; }
    if (pwd.length < 6) { hmShowMsg("registerError", "Salasana liian lyhyt (min 6 merkkiä)"); return; }
    try {
      var res  = await fetch("/api/auth/register", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username:uname,email:email,password:pwd}) });
      var data = await res.json();
      if (!res.ok) { hmShowMsg("registerError", data.error || "Rekisteröityminen epäonnistui"); return; }
      hmShowMsg("registerSuccess", data.message || "Tili luotu!");
      setTimeout(function() { hmSwitchModal("register","login"); }, 1800);
    } catch(e) { hmShowMsg("registerError", "Verkkovirhe — yritä uudelleen"); }
  }

  async function hmLogout() {
    localStorage.removeItem("hm_token");
    localStorage.removeItem("hm_user");
    hmUpdateNavAuth();
  }

  // ── Renderöi KAIKKI pelit ────────────────────────────────────────────────
  function renderCalendar() {
    var el = document.getElementById("calendarContent");
    if (!el) return;

    var todayKey = (function() {
      var n = new Date();
      return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0");
    })();

    var days = Object.keys(HM_SCHEDULE).sort();
    var html = "";

    days.forEach(function(dateKey) {
      var matches = HM_SCHEDULE[dateKey];
      var isToday  = dateKey === todayKey;
      var isPast   = dateKey < todayKey;

      var d     = new Date(dateKey + "T12:00:00");
      var label = d.toLocaleDateString("fi-FI", {weekday:"long", day:"numeric", month:"long"});
      label     = label.charAt(0).toUpperCase() + label.slice(1);

      html += '<div class="day-block' + (isPast ? " past-day" : "") + '">';
      html += '<div class="day-header">' + label;
      if (isToday) html += ' <span class="today-badge">TÄNÄÄN</span>';
      html += '</div>';

      matches.forEach(function(m) {
        html += '<div class="match-row">' +
          '<span class="match-time">' + m.t + '</span>' +
          '<span class="match-teams">' + m.g + '</span>' +
          '</div>';
      });

      html += '</div>';
    });

    el.innerHTML = html || '<p style="color:var(--muted)">Ei otteluita.</p>';
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function() {
    hmApplyLang();
    hmUpdateNavAuth();
    hmUpdateCountdown();
    renderCalendar();
  });
</script>
</body>
</html>
